<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>세계지도</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        overflow: hidden;
        background: #080d1a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #globe-svg {
        position: fixed;
        top: 0; left: 0;
        width: 100vw;
        height: 100vh;
        cursor: grab;
        touch-action: none;
        user-select: none;
      }
      #globe-svg:active { cursor: grabbing; }

      /* Floating header */
      .globe-header {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 100;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 16px 20px 16px;
        pointer-events: none;
      }
      .globe-header > * { pointer-events: auto; }

      .header-left .eyebrow {
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #5cc9a8;
        margin: 0 0 4px;
        text-shadow: 0 0 12px rgba(92,201,168,0.5);
      }
      .header-left h1 {
        margin: 0;
        font-size: clamp(1.6rem, 4vw, 2.4rem);
        font-weight: 800;
        color: #f0f0f0;
        line-height: 1.1;
        text-shadow: 0 2px 12px rgba(0,0,0,0.8);
      }

      .mode-tabs {
        display: flex;
        gap: 5px;
        margin-top: 8px;
      }
      .mode-tab {
        padding: 4px 14px;
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.25);
        background: transparent;
        color: rgba(255,255,255,0.5);
        font-size: 0.8rem;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.15s;
      }
      .mode-tab.active {
        background: rgba(255,255,255,0.18);
        color: #fff;
        border-color: rgba(255,255,255,0.5);
      }
      .mode-tab:hover:not(.active) { color: rgba(255,255,255,0.8); }

      .ocean-label {
        fill: #a8d8f0;
        font-style: italic;
        paint-order: stroke fill;
      }

      .header-right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
      }

      #score-bar {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: #aaa;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.15);
        padding: 4px 8px 4px 10px;
        border-radius: 20px;
      }
      #score-bar strong { color: #fff; font-weight: 700; }
      .reset-btn {
        background: none;
        border: 1px solid rgba(255,255,255,0.25);
        color: rgba(255,255,255,0.6);
        width: 22px; height: 22px;
        border-radius: 50%;
        font-size: 13px;
        line-height: 1;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: border-color 0.15s, color 0.15s;
      }
      .reset-btn:hover { border-color: rgba(255,255,255,0.7); color: white; }

      .lang-select {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        color: white;
        padding: 8px 10px;
        border-radius: 8px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        appearance: none;
        -webkit-appearance: none;
      }
      .lang-select:focus { outline: none; border-color: rgba(255,255,255,0.5); }
      .lang-select option { background: #1a2035; color: white; }

      .quiz-btn {
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        background: #2a6b5e;
        color: white;
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.15s;
      }
      .quiz-btn:hover { background: #1d5045; }

      .country-label {
        fill: white;
        text-anchor: middle;
        dominant-baseline: middle;
        font-weight: 700;
        pointer-events: none;
        paint-order: stroke fill;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      /* Bottom quiz panel */
      .bottom-panel {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: white;
        border-top: 1px solid #d0dbd8;
        border-radius: 16px 16px 0 0;
        box-shadow: 0 -6px 28px rgba(0,0,0,0.14);
        transform: translateY(100%);
        transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 200;
        max-width: 560px;
        margin: 0 auto;
      }
      .bottom-panel.open { transform: translateY(0); }

      .panel-handle {
        width: 36px; height: 4px; background: #ccc;
        border-radius: 2px; margin: 16px auto 0;
      }

      .quiz-inner { padding: 20px 20px 36px; }
      .quiz-question {
        font-size: 0.88rem; font-weight: 700;
        color: #888; margin: 0 0 14px;
        text-align: center;
      }
      .quiz-choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .quiz-choice {
        padding: 14px 8px; border-radius: 10px;
        border: 2px solid #d0dbd8; background: white;
        font-size: 1rem; font-weight: 700; color: #1a3a32;
        cursor: pointer; transition: border-color 0.12s, background 0.12s;
        font-family: inherit;
      }
      .quiz-choice:hover:not(:disabled) { border-color: #2a6b5e; background: #e8f4f2; }
      .quiz-choice.correct { border-color: #2a6b5e; background: #d4ede8; color: #1a4a3a; }
      .quiz-choice.wrong { border-color: #d63c3c; background: #fde8e8; color: #7a1a1a; }
      .quiz-choice:disabled { cursor: default; }
    </style>
  </head>
  <body>
    <svg id="globe-svg"></svg>

    <header class="globe-header">
      <div class="header-left">
        <h1 id="globe-title">세계지도</h1>
        <div class="mode-tabs">
          <button class="mode-tab active" id="tab-country" type="button">나라</button>
          <button class="mode-tab" id="tab-ocean" type="button">바다</button>
        </div>
      </div>
      <div class="header-right">
        <div style="display:flex; gap:8px; align-items:center;">
          <select class="lang-select" id="lang-select">
            <option value="ko">한국어</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
          </select>
          <button class="quiz-btn" id="btn-quiz" type="button">퀴즈</button>
        </div>
        <div id="score-bar" hidden>
          <span><span id="score-label">맞힌 나라</span>: <strong id="score-display">0 / 0</strong></span>
          <button class="reset-btn" id="btn-reset" type="button" title="초기화">↺</button>
        </div>
      </div>
    </header>

    <div class="bottom-panel" id="quiz-panel" role="dialog" aria-modal="true" aria-label="퀴즈">

        <div class="quiz-choices" id="quiz-choices"></div>
      </div>
    </div>

        ko: { label: '한국어', title: '세계지도', quizOn: '퀴즈', quizOff: '일반', scoreLabel: '맞힌 나라', quizQuestion: '이 나라는 어디일까요?', tabCountry: '나라', tabOcean: '바다', names: NAMES_KO },
        en: { label: 'English', title: 'World Map', quizOn: 'Quiz', quizOff: 'Normal', scoreLabel: 'Score', quizQuestion: 'Which country is this?', tabCountry: 'Country', tabOcean: 'Ocean', names: NAMES_EN },
        ja: { label: '日本語', title: '世界地図', quizOn: 'クイズ', quizOff: '通常', scoreLabel: '正解数', quizQuestion: 'この国はどこ？', tabCountry: '国', tabOcean: '海', names: NAMES_JA },
      };

      let lang = 'ko';
      const names = () => LANGS[lang].names;

      // 바다/해양 데이터 (고정 좌표 기반)
      const OCEANS = [
        { id: 'pacific_n',  ko: '북태평양',    en: 'North Pacific Ocean',  ja: '北太平洋',      lon: -155, lat: 28,  size: 'large' },
        { id: 'pacific_s',  ko: '남태평양',    en: 'South Pacific Ocean',  ja: '南太平洋',      lon: -140, lat: -25, size: 'large' },
        { id: 'atlantic_n', ko: '북대서양',    en: 'North Atlantic Ocean', ja: '北大西洋',      lon: -35,  lat: 45,  size: 'large' },
        { id: 'atlantic_s', ko: '남대서양',    en: 'South Atlantic Ocean', ja: '南大西洋',      lon: -20,  lat: -30, size: 'large' },
        { id: 'indian',     ko: '인도양',      en: 'Indian Ocean',         ja: 'インド洋',      lon: 75,   lat: -22, size: 'large' },
        { id: 'arctic',     ko: '북극해',      en: 'Arctic Ocean',         ja: '北極海',        lon: 0,    lat: 82,  size: 'large' },
        { id: 'southern',   ko: '남극해',      en: 'Southern Ocean',       ja: '南極海',        lon: 0,    lat: -65, size: 'large' },
        { id: 'mediterranean', ko: '지중해',   en: 'Mediterranean Sea',    ja: '地中海',        lon: 16,   lat: 36,  size: 'medium' },
        { id: 'caribbean',  ko: '카리브해',    en: 'Caribbean Sea',        ja: 'カリブ海',      lon: -75,  lat: 16,  size: 'medium' },
        { id: 'south_china',ko: '남중국해',    en: 'South China Sea',      ja: '南シナ海',      lon: 114,  lat: 13,  size: 'medium' },
        { id: 'arabian',    ko: '아라비아해',  en: 'Arabian Sea',          ja: 'アラビア海',    lon: 63,   lat: 17,  size: 'medium' },
        { id: 'bengal',     ko: '벵골만',      en: 'Bay of Bengal',        ja: 'ベンガル湾',    lon: 88,   lat: 14,  size: 'medium' },
        { id: 'bering',     ko: '베링해',      en: 'Bering Sea',           ja: 'ベーリング海',  lon: -175, lat: 58,  size: 'medium' },
        { id: 'gulf_mexico',ko: '멕시코만',    en: 'Gulf of Mexico',       ja: 'メキシコ湾',    lon: -90,  lat: 25,  size: 'medium' },
        { id: 'coral',      ko: '산호해',      en: 'Coral Sea',            ja: 'コーラル海',    lon: 155,  lat: -18, size: 'medium' },
        { id: 'okhotsk',    ko: '오호츠크해',  en: 'Sea of Okhotsk',       ja: 'オホーツク海',  lon: 150,  lat: 55,  size: 'medium' },
        { id: 'east_china', ko: '동중국해',    en: 'East China Sea',       ja: '東シナ海',      lon: 125,  lat: 29,  size: 'small' },
        { id: 'japan',      ko: '동해',        en: 'Sea of Japan',         ja: '日本海',        lon: 134,  lat: 40,  size: 'small' },
        { id: 'yellow',     ko: '황해',        en: 'Yellow Sea',           ja: '黄海',          lon: 122,  lat: 35,  size: 'small' },
        { id: 'red',        ko: '홍해',        en: 'Red Sea',              ja: '紅海',          lon: 38,   lat: 20,  size: 'small' },
        { id: 'black',      ko: '흑해',        en: 'Black Sea',            ja: '黒海',          lon: 33,   lat: 43,  size: 'small' },
        { id: 'caspian',    ko: '카스피해',    en: 'Caspian Sea',          ja: 'カスピ海',      lon: 51,   lat: 42,  size: 'small' },
        { id: 'persian',    ko: '페르시아만',  en: 'Persian Gulf',         ja: 'ペルシャ湾',    lon: 52,   lat: 27,  size: 'small' },
        { id: 'north',      ko: '북해',        en: 'North Sea',            ja: '北海',          lon: 4,    lat: 56,  size: 'small' },
        { id: 'baltic',     ko: '발트해',      en: 'Baltic Sea',           ja: 'バルト海',      lon: 19,   lat: 58,  size: 'small' },
      ];

      const QUIZ_STORAGE_KEY = 'ashosho-globe-quiz';

      function saveQuizProgress() {
        try {
          localStorage.setItem(QUIZ_STORAGE_KEY, JSON.stringify({
            answered: [...state.answered.entries()],
            correct: state.score.correct,
          }));
        } catch {}
      }

      function loadQuizProgress() {
        try {
          const raw = localStorage.getItem(QUIZ_STORAGE_KEY);
          if (!raw) return;
          const data = JSON.parse(raw);
          if (Array.isArray(data.answered)) {
            state.answered = new Map(data.answered);
            state.score.correct = data.correct || 0;
          }
        } catch {}
      }

      function clearQuizProgress() {
        localStorage.removeItem(QUIZ_STORAGE_KEY);
        state.answered.clear();
        state.activeId = null;
        state.score = { correct: 0 };
      }

      // 해외 영토로 인해 자동 centroid가 틀어지는 나라의 좌표 수동 지정 [lon, lat]
      const CENTROIDS = {
        250: [2.5, 46.5],    // 프랑스 (프랑스령 기아나로 인해 centroid가 대서양으로 치우침)
        840: [-98, 38],      // 미국 (알래스카·하와이로 인해 치우침)
        578: [9, 62],        // 노르웨이 (스발바르 제도로 인해 치우침)
        620: [-8, 39.5],     // 포르투갈 (아조레스·마데이라로 인해 치우침)
        528: [5.3, 52.4],    // 네덜란드 (카리브 영토로 인해 치우침)
        152: [-73, -37],     // 칠레 (가늘고 긴 국토로 인해 치우침)
        704: [109, 14],      // 베트남 (가늘고 긴 국토로 인해 치우침)
        191: [16, 46.5],     // 크로아티아 (위로 조정)
        454: [33.5, -13.2],  // 말라위 (왼쪽으로 조정)
      };

      let mapMode = 'country'; // 'country' | 'ocean'

      const state = {
        quizMode: false,
        rotation: [-127, -35],
        scale: 0,
        answered: new Map(),
        activeId: null,
        score: { correct: 0 },
      };

      let features = [];
      let totalNamedCountries = 0;
      let svg, proj, pathGen;
      let baseScale = 0;
      let dragMoved = false;
      let pinchDist = null;
      let hoveredId = null;
      const activePointers = new Map();
      const isMobile = window.matchMedia('(pointer: coarse)').matches;

      const STAR_COUNT = 350;
      let stars = [];

      function initStars(w, h) {
        stars = Array.from({ length: STAR_COUNT }, (_, i) => ({
          id: i,
          x: Math.random() * w,
          y: Math.random() * h,
          r: Math.random() * 1.4 + 0.3,
          opacity: Math.random() * 0.55 + 0.25,
          speed: Math.random() * 0.18 + 0.04,
        }));
      }

      function drawStars() {
        d3.select('#g-stars').selectAll('circle')
          .data(stars, d => d.id)
          .join('circle')
          .attr('cx', d => d.x)
          .attr('cy', d => d.y)
          .attr('r', d => d.r)
          .attr('fill', 'white')
          .attr('opacity', d => d.opacity);
      }

      function updateStars(dx, dy) {
        const w = window.innerWidth, h = window.innerHeight;
        stars.forEach(s => {
          s.x = ((s.x - dx * s.speed) % w + w) % w;
          s.y = ((s.y + dy * s.speed) % h + h) % h;
        });
        drawStars();
      }

      async function init() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        const cx = w / 2, cy = h / 2;
        const r = Math.min(cx, cy) * 0.93;
        baseScale = r;
        state.scale = r;

        const svgEl = document.getElementById('globe-svg');
        svgEl.setAttribute('viewBox', `0 0 ${w} ${h}`);

        proj = d3.geoOrthographic()
          .scale(state.scale)
          .translate([cx, cy])
          .rotate(state.rotation)
          .clipAngle(90);

        pathGen = d3.geoPath(proj);
        svg = d3.select('#globe-svg');

        svg.append('g').attr('id', 'g-stars');
        svg.append('g').attr('id', 'g-sphere');
        svg.append('g').attr('id', 'g-graticule');
        svg.append('g').attr('id', 'g-countries');
        svg.append('g').attr('id', 'g-labels');

        initStars(w, h);
        drawStars();

        svg.call(
          d3.drag()
            .on('start', () => { dragMoved = false; hoveredId = null; })
            .on('drag', (ev) => {
              if (activePointers.size >= 2) return; // 핀치 중엔 드래그 무시
              dragMoved = true;
              const sens = 0.4 * (baseScale / state.scale);
              const [λ, φ] = proj.rotate();
              proj.rotate([
                λ + ev.dx * sens,
                Math.max(-89, Math.min(89, φ - ev.dy * sens)),
              ]);
              state.rotation = proj.rotate();
              updateStars(ev.dx, ev.dy);
              draw();
            })
        );

        svg.on('click', onGlobeClick);

        // Mouse wheel zoom
        svgEl.addEventListener('wheel', (e) => {
          e.preventDefault();
          const factor = e.deltaY > 0 ? 0.92 : 1.08;
          state.scale = Math.max(baseScale, Math.min(baseScale * 8, state.scale * factor));
          proj.scale(state.scale);
          draw();
        }, { passive: false });

        // Pinch-to-zoom (Pointer Events — touch/mouse 모두 동작)
        svgEl.addEventListener('pointerdown', (e) => {
          if (e.pointerType === 'touch') {
            activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
          }
        });

        svgEl.addEventListener('pointermove', (e) => {
          if (e.pointerType !== 'touch' || !activePointers.has(e.pointerId)) return;
          activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
          if (activePointers.size === 2) {
            const [p1, p2] = activePointers.values();
            const dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
            if (pinchDist !== null) {
              state.scale = Math.max(baseScale, Math.min(baseScale * 8, state.scale * (dist / pinchDist)));
              proj.scale(state.scale);
              draw();
            }
            pinchDist = dist;
          }
        }, { passive: true });

        const onPointerEnd = (e) => {
          activePointers.delete(e.pointerId);
          if (activePointers.size < 2) pinchDist = null;
        };
        svgEl.addEventListener('pointerup', onPointerEnd);
        svgEl.addEventListener('pointercancel', onPointerEnd);

        document.addEventListener('click', (e) => {
          if (!e.target.closest('#quiz-panel') && !e.target.closest('#globe-svg')) {
            closePanel();
          }
        });

        const world = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r => r.json());
        features = topojson.feature(world, world.objects.countries).features;
        // null ID feature에 centroid 기반으로 커스텀 ID 부여
        features.forEach(f => {
          if (f.id == null) {
            const [lon, lat] = d3.geoCentroid(f);
            if (Math.abs(lon - 20.9) < 1 && Math.abs(lat - 42.6) < 1) f.id = 9001; // 코소보
            else if (Math.abs(lon - 46.2) < 1 && Math.abs(lat - 9.8) < 1) f.id = 9002; // 소말릴란드
          }
        });
        totalNamedCountries = features.filter(f => names()[+f.id]).length;
        draw();
      }

      function countryFill(id) {
        if (mapMode === 'ocean') return '#2a6b5e';
        if (!state.quizMode) {
          return id === hoveredId ? '#3d8a72' : '#2a6b5e';
        }
        if (state.activeId === id) return '#f59e0b';
        const ans = state.answered.get(id);
        if (ans === 'correct') return '#16a34a';
        if (ans === 'wrong') return '#dc2626';
        return id === hoveredId ? '#7a8fa8' : '#94a3b8';
      }

      function draw() {
        const zoomRatio = state.scale / baseScale;

        d3.select('#g-sphere').selectAll('path')
          .data([{ type: 'Sphere' }]).join('path')
          .attr('d', pathGen)
          .attr('fill', '#4585b5');

        d3.select('#g-graticule').selectAll('path')
          .data([d3.geoGraticule()()])
          .join('path')
          .attr('d', pathGen)
          .attr('fill', 'none')
          .attr('stroke', 'rgba(255,255,255,0.25)')
          .attr('stroke-width', 0.5);

        d3.select('#g-countries').selectAll('path')
          .data(features, d => d.id)
          .join(
            enter => enter.append('path')
              .on('mouseenter', (ev, d) => {
                const id = +d.id;
                if (!NAMES[id]) return;
                hoveredId = id;
                d3.select(ev.currentTarget).attr('fill', countryFill(id));
              })
              .on('mouseleave', (ev, d) => {
                hoveredId = null;
                d3.select(ev.currentTarget).attr('fill', countryFill(+d.id));
              })
          )
          .attr('d', pathGen)
          .attr('fill', d => countryFill(+d.id))
          .attr('stroke', 'rgba(255,255,255,0.6)')
          .attr('stroke-width', 0.4);

        const labelsG = d3.select('#g-labels');
        if (mapMode === 'ocean') {
          // 바다 모드: 해양 이름 표시
          const sizeMap = { large: isMobile ? 13 : Math.max(11, Math.min(17, 13 * zoomRatio)),
                            medium: isMobile ? 11 : Math.max(9, Math.min(14, 11 * zoomRatio)),
                            small:  isMobile ? 9  : Math.max(8, Math.min(12, 9  * zoomRatio)) };
          const oceanData = OCEANS.map(o => ({ ...o, pos: proj([o.lon, o.lat]) }))
                                   .filter(o => o.pos !== null);
          labelsG.selectAll('text')
            .data(oceanData, d => d.id)
            .join('text')
            .attr('class', 'country-label ocean-label')
            .attr('stroke', 'rgba(0,20,60,0.6)')
            .attr('stroke-width', 2.5)
            .style('font-size', d => sizeMap[d.size] + 'px')
            .attr('x', d => d.pos[0])
            .attr('y', d => d.pos[1])
            .text(d => d[lang]);
        } else if (state.quizMode) {
          labelsG.selectAll('text').remove();
        } else {
          // 나라 모드: 국가 이름 표시
          const fontSize = isMobile ? 11 : Math.max(8, Math.min(16, 11 * zoomRatio));
          const strokeW = 2.5;
          const areaThreshold = Math.max(20, 800 / (zoomRatio * zoomRatio));

          labelsG.selectAll('text')
            .data(features.filter(f => names()[+f.id]), d => d.id)
            .join('text')
            .attr('class', 'country-label')
            .attr('stroke', 'rgba(0,0,0,0.55)')
            .attr('stroke-width', strokeW)
            .style('font-size', fontSize + 'px')
            .each(function(d) {
              const centroid = CENTROIDS[+d.id] || d3.geoCentroid(d);
              const pos = proj(centroid);
              const area = pathGen.area(d);
              const visible = pos !== null && area > areaThreshold;
              d3.select(this)
                .style('display', visible ? null : 'none')
                .attr('x', pos ? pos[0] : 0)
                .attr('y', pos ? pos[1] : 0)
                .text(names()[+d.id]);
            });
        }
      }

      function onGlobeClick(event) {
        if (dragMoved) { dragMoved = false; return; }
        const [mx, my] = d3.pointer(event);
        const inv = proj.invert([mx, my]);
        if (!inv) return;
        const clicked = features.find(f => d3.geoContains(f, inv));
        if (!clicked) return;
        const id = +clicked.id;
        if (mapMode === 'ocean') return;
        if (!names()[id]) return;
        if (!state.quizMode) return;
        if (state.answered.has(id)) return;
        state.activeId = id;
        draw();
        event.stopPropagation();
        openQuizPanel(id);
      }

      function openQuizPanel(id) {
        const correct = names()[id];
        const pool = Object.values(names()).filter(n => n !== correct);
        const wrong = [];
        while (wrong.length < 3 && pool.length > 0) {
          wrong.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
        }
        const choices = [correct, ...wrong].sort(() => Math.random() - 0.5);

        const el = document.getElementById('quiz-choices');
        el.innerHTML = choices
          .map(n => `<button class="quiz-choice" type="button">${n}</button>`)
          .join('');

        el.querySelectorAll('.quiz-choice').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            onAnswer(id, correct, btn.textContent, el);
          });
        });

        document.getElementById('quiz-panel').classList.add('open');
      }

      function onAnswer(id, correct, chosen, el) {
        const ok = chosen === correct;
        el.querySelectorAll('.quiz-choice').forEach(btn => {
          btn.disabled = true;
          if (btn.textContent === correct) btn.classList.add('correct');
          else if (btn.textContent === chosen && !ok) btn.classList.add('wrong');
        });
        state.answered.set(id, ok ? 'correct' : 'wrong');
        if (ok) state.score.correct++;
        saveQuizProgress();
        updateScore();
        draw();
        state.activeId = null; closePanel(); draw();
      }

      function closePanel() {
        document.getElementById('quiz-panel').classList.remove('open');
        if (state.activeId !== null) { state.activeId = null; draw(); }
      }

      function updateScore() {
        const { correct } = state.score;
        document.getElementById('score-label').textContent = LANGS[lang].scoreLabel;
        document.getElementById('score-display').textContent = `${correct} / ${totalNamedCountries}`;
      }

      function applyLang() {
        const L = LANGS[lang];
        document.getElementById('globe-title').textContent = L.title;
        document.getElementById('quiz-question').textContent = L.quizQuestion;
        document.getElementById('btn-quiz').textContent = state.quizMode ? L.quizOff : L.quizOn;
        document.getElementById('tab-country').textContent = L.tabCountry;
        document.getElementById('tab-ocean').textContent = L.tabOcean;
        updateScore();
        draw();
      }

      function setMapMode(mode) {
        mapMode = mode;
        document.getElementById('tab-country').classList.toggle('active', mode === 'country');
        document.getElementById('tab-ocean').classList.toggle('active', mode === 'ocean');
        // 바다 모드에서는 퀴즈 숨김
        const quizArea = document.querySelector('.header-right div');
        quizArea.style.display = mode === 'ocean' ? 'none' : '';
        document.getElementById('score-bar').hidden = mode === 'ocean' || !state.quizMode;
        draw();
      }

      document.getElementById('btn-quiz').addEventListener('click', () => {
        state.quizMode = !state.quizMode;
        if (state.quizMode) {
          state.answered.clear();
          state.score = { correct: 0 };
          loadQuizProgress(); // 이전 진행상황 복원
        }
        state.activeId = null;
        closePanel();
        document.getElementById('btn-quiz').textContent = state.quizMode ? LANGS[lang].quizOff : LANGS[lang].quizOn;
        document.getElementById('score-bar').hidden = !state.quizMode;
        updateScore();
        draw();
      });

      document.getElementById('btn-reset').addEventListener('click', () => {
        clearQuizProgress();
        updateScore();
        draw();
      });

      window.addEventListener('resize', () => {
        const nw = window.innerWidth, nh = window.innerHeight;
        const prevRatio = state.scale / baseScale;
        const r = Math.min(nw / 2, nh / 2) * 0.93;
        baseScale = r;
        state.scale = Math.max(r, Math.min(r * 8, r * prevRatio));
        proj.scale(state.scale).translate([nw / 2, nh / 2]);
        pathGen = d3.geoPath(proj);
        document.getElementById('globe-svg').setAttribute('viewBox', `0 0 ${nw} ${nh}`);
        draw();
      });

      document.getElementById('tab-country').addEventListener('click', () => setMapMode('country'));
      document.getElementById('tab-ocean').addEventListener('click', () => setMapMode('ocean'));

      document.getElementById('lang-select').addEventListener('change', (e) => {
        lang = e.target.value;
        applyLang();
      });

      init().catch(console.error);
    </script>
  </body>
</html>
