<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>나의 단어장</title>
  <link rel="stylesheet" href="../../assets/styles.css" />
  <style>
    .vx       { align-items: start; padding: 16px; }
    .vx-panel { width: min(760px, 100%); }

    /* ── header ── */
    .vx-header {
      display: flex; align-items: center;
      justify-content: space-between; gap: 12px; margin-bottom: 18px;
    }
    .vx-header h1 { margin: 0; font-size: clamp(1.4rem,5vw,1.9rem); }
    .vx-manual-btn {
      flex-shrink: 0;
      min-height: 38px; padding: 0 18px; border-radius: 20px;
      border: 2px solid var(--accent); background: var(--surface);
      color: var(--accent-strong); font: inherit; font-size: .97rem; font-weight: 900;
      cursor: pointer; transition: .15s; letter-spacing: -.01em;
    }
    .vx-manual-btn:hover { background: #e8f4f2; }

    /* ── tabs ── */
    .vx-tabs {
      display: flex; border-bottom: 1px solid var(--line); margin-bottom: 24px;
    }
    .vx-tab {
      flex: 1; padding: 10px 0; background: none; border: none;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      color: var(--muted); font: inherit; font-size: .88rem; font-weight: 800;
      cursor: pointer; transition: .15s;
    }
    .vx-tab:hover:not(:disabled) { color: var(--text); }
    .vx-tab.is-active { color: var(--accent-strong); border-bottom-color: var(--accent); }
    .vx-tab:disabled { opacity: .35; cursor: not-allowed; }

    /* ── status ── */
    .vx-status {
      min-height: 20px; margin-bottom: 12px;
      font-size: .84rem; font-weight: 800; color: var(--accent-strong);
    }
    .vx-status.error { color: var(--red); }

    /* ── upload screen ── */
    .vx-upload-grid { display: grid; gap: 16px; }

    /* compact prompt row */
    .vx-prompt-row {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 12px 14px; background: var(--surface-strong);
      border: 1px solid var(--line); border-radius: 10px;
    }
    .vx-prompt-label { font-size: .8rem; font-weight: 900; color: var(--muted); white-space: nowrap; }
    .vx-unit-input {
      flex: 1; min-width: 120px; min-height: 32px; padding: 0 10px;
      border: 1px solid var(--line); border-radius: 6px;
      background: var(--surface); color: var(--text);
      font: inherit; font-size: .82rem;
    }
    .vx-unit-input:focus { outline: none; border-color: var(--accent); }
    .vx-unit-input:focus::placeholder { color: transparent; }

    /* AI links */
    .vx-ai-links { display: flex; flex-wrap: wrap; gap: 8px; }
    .vx-ai-link {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 13px; border-radius: 8px;
      border: 1px solid var(--line); background: var(--surface);
      color: var(--muted); font-size: .82rem; font-weight: 800;
      text-decoration: none; transition: .15s;
    }
    .vx-ai-link:hover { border-color: var(--accent); color: var(--accent-strong); background: #e8f4f2; }

    /* drop filename badge */
    .vx-drop-filename {
      display: inline-flex; align-items: center; gap: 7px;
      background: #e8f4f2; border: 1px solid var(--accent);
      border-radius: 20px; padding: 4px 12px;
      font-weight: 800; color: var(--accent-strong);
    }

    /* file upload — secondary */
    .vx-file-alt {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 12px 14px; border: 1px solid var(--line); border-radius: 10px;
      background: var(--surface-strong);
    }
    .vx-file-alt-label {
      font-size: .8rem; font-weight: 900; color: var(--muted); white-space: nowrap;
    }
    .vx-file-alt-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 8px;
      border: 1px solid var(--line); background: var(--surface);
      color: var(--muted); font-size: .83rem; font-weight: 800;
      cursor: pointer; transition: .15s; white-space: nowrap;
    }
    .vx-file-alt-btn:hover, .vx-file-alt-btn.over {
      border-color: var(--accent); background: #e8f4f2; color: var(--accent-strong);
    }

    /* merge options */
    .vx-merge-opts {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .vx-merge-btn {
      padding: 12px 10px; border-radius: 10px;
      border: 1px solid var(--line); background: var(--surface);
      color: var(--muted); font: inherit; font-size: .83rem; font-weight: 800;
      cursor: pointer; text-align: center; transition: .15s;
    }
    .vx-merge-btn:hover { border-color: var(--accent); background: #e8f4f2; color: var(--accent-strong); }
    .vx-merge-btn strong { display: block; font-size: .9rem; color: var(--text); margin-bottom: 3px; }
    .vx-merge-btn.primary { border-color: var(--accent); background: var(--accent); color: #fff; }
    .vx-merge-btn.primary strong { color: #fff; }
    .vx-merge-btn.primary:hover { background: var(--accent-strong); }

    /* generic buttons */
    .vx-btn {
      min-height: 36px; padding: 0 14px; border-radius: 8px;
      border: 1px solid var(--line); background: var(--surface);
      color: var(--muted); font: inherit; font-size: .85rem; font-weight: 800;
      cursor: pointer; transition: .15s;
    }
    .vx-btn:hover { border-color: var(--accent); background: #e8f4f2; color: var(--accent-strong); }
    .vx-btn.primary { border-color: var(--accent); background: var(--accent); color: #fff; }
    .vx-btn.primary:hover { background: var(--accent-strong); }
    .vx-btn.danger:hover { border-color: var(--red); background: #fff1f0; color: var(--red); }
    .vx-toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

    /* book-actions */
    .vx-book-actions {
      background: var(--surface-strong); border: 1px solid var(--line);
      border-radius: 10px; padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; flex-wrap: wrap;
    }
    .vx-book-actions-info { font-size: .85rem; font-weight: 800; }
    .vx-book-actions-info span { color: var(--muted); font-weight: 700; }

    /* ────────────────────────────────────────
       MANUAL MODAL (사용설명서)
    ──────────────────────────────────────── */
    .vx-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.55); backdrop-filter: blur(2px);
      display: flex; align-items: flex-start; justify-content: center;
      padding: 20px 12px; overflow-y: auto;
      animation: vxfade .2s ease;
    }
    .vx-overlay.hidden { display: none; }
    @keyframes vxfade { from { opacity:0; } to { opacity:1; } }

    .vx-modal {
      background: var(--surface); border-radius: 16px;
      width: min(560px, 100%); padding: 16px;
      animation: vxslide .22s ease;
    }
    @keyframes vxslide { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:none; } }

    .vx-modal-head {
      display: flex; align-items: center; justify-content: flex-end;
      margin-bottom: 10px;
    }
    .vx-modal-close {
      width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--line);
      background: var(--surface-strong); color: var(--muted); font: inherit;
      font-size: 1.1rem; cursor: pointer; display: grid; place-items: center; transition: .15s;
    }
    .vx-modal-close:hover { background: #ffefef; color: var(--red); border-color: #ffb3b3; }

    /* card news grid */
    .vx-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
    .vx-ccard {
      border: 1px solid var(--line); border-radius: 14px; overflow: hidden;
      background: var(--surface-strong);
    }
    /* image placeholder — square */
    .vx-ccard-img {
      aspect-ratio: 1 / 1;
      background: #f0f4f3;
      border-bottom: 1px solid var(--line);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; padding: 16px;
      border: 2px dashed #c5d9d6; border-radius: 13px 13px 0 0;
      color: #9ab8b3;
    }
    .vx-ccard-img-icon { font-size: 2.8rem; line-height: 1; opacity: .6; }
    .vx-ccard-img-label {
      font-size: .75rem; font-weight: 700; color: #9ab8b3;
      text-align: center; line-height: 1.5;
    }
    /* card body */
    .vx-ccard-body { padding: 18px; display: grid; gap: 12px; }
    .vx-ccard-num {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--accent); color: #fff;
      font-size: .9rem; font-weight: 900;
      display: grid; place-items: center; flex-shrink: 0;
    }
    .vx-ccard-head { display: flex; align-items: center; gap: 10px; }
    .vx-ccard-title { font-size: .98rem; font-weight: 900; margin: 0; line-height: 1.3; }
    .vx-ccard-desc {
      font-size: .82rem; font-weight: 700; color: var(--muted);
      line-height: 1.65; margin: 0;
    }

    /* photo tips */
    .vx-tips { display: flex; flex-wrap: wrap; gap: 6px; }
    .vx-tip {
      background: var(--surface); border: 1px solid var(--line);
      border-radius: 7px; padding: 6px 10px;
      font-size: .78rem; font-weight: 700; color: var(--muted);
    }

    /* prompt inside modal */
    .vx-prompt-wrap {
      border: 1px solid var(--line); border-radius: 10px; overflow: hidden;
    }
    .vx-prompt-head {
      background: var(--surface); padding: 9px 12px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--line); gap: 8px; flex-wrap: wrap;
    }
    .vx-prompt-head-left { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .vx-prompt-head-label { font-size: .77rem; font-weight: 900; color: var(--muted); }
    .vx-unit-input-modal {
      min-height: 28px; padding: 0 9px; border: 1px solid var(--line);
      border-radius: 5px; background: var(--surface-strong); color: var(--text);
      font: inherit; font-size: .8rem; width: 130px;
    }
    .vx-unit-input-modal:focus { outline: none; border-color: var(--accent); }
    .vx-prompt-text {
      padding: 12px 14px; font-size: .78rem; font-weight: 700; color: var(--muted);
      line-height: 1.7; white-space: pre-wrap; font-family: inherit;
      background: var(--surface-strong); margin: 0; max-height: 220px; overflow-y: auto;
    }

    /* paste zone — main */
    .vx-paste-wrap {
      display: flex; flex-direction: column; gap: 10px;
    }
    .vx-paste-area {
      width: 100%; padding: 16px; border: 2px solid var(--line);
      border-radius: 12px; background: var(--surface); color: var(--text);
      font: inherit; font-size: .88rem; line-height: 1.7; resize: vertical;
      transition: border-color .15s; min-height: 200px;
    }
    .vx-paste-area:focus { outline: none; border-color: var(--accent); }
    .vx-paste-area::placeholder { color: var(--muted); opacity: .6; font-size:.85rem; }

    /* ── study screen ── */
    .vx-study-bar {
      display: flex; gap: 8px; align-items: center;
      flex-wrap: wrap; margin-bottom: 18px;
    }
    .vx-unit-sel {
      min-height: 36px; padding: 0 10px; border-radius: 8px;
      border: 1px solid var(--line); background: var(--surface);
      color: var(--text); font: inherit; font-size: .85rem; font-weight: 700;
      flex-shrink: 0; max-width: 220px;
    }
    .vx-search {
      flex: 1; min-width: 120px; min-height: 36px; padding: 0 12px;
      border: 1px solid var(--line); border-radius: 8px;
      background: var(--surface); color: var(--text); font: inherit;
      font-size: .88rem;
    }
    .vx-search:focus, .vx-unit-sel:focus { outline: none; border-color: var(--accent); }
    .vx-toggle {
      min-height: 36px; padding: 0 12px; border-radius: 8px;
      border: 1px solid var(--line); background: var(--surface);
      color: var(--muted); font: inherit; font-size: .82rem; font-weight: 800;
      cursor: pointer; transition: .15s; white-space: nowrap;
    }
    .vx-toggle.is-on { border-color: var(--accent); background: #e8f4f2; color: var(--accent-strong); }
    .vx-toggle:hover { border-color: var(--accent); color: var(--accent-strong); }

    /* entry cards */
    .vx-entry-list { display: grid; gap: 6px; }
    .vx-entry {
      border: 1px solid var(--line); border-radius: 10px;
      padding: 14px 16px; background: var(--surface);
      transition: border-color .15s;
    }
    .vx-entry:hover { border-color: #b8d0cc; }
    .vx-entry-top {
      display: flex; align-items: baseline;
      justify-content: space-between; gap: 10px; margin-bottom: 4px;
    }
    .vx-entry-head { display: flex; align-items: baseline; gap: 9px; flex-wrap: wrap; }
    .vx-word  { font-size: 1.25rem; font-weight: 900; line-height: 1.2; }
    .vx-pron  { font-size: .82rem; color: var(--muted); font-weight: 600; }
    .vx-meaning {
      font-size: .97rem; font-weight: 800;
      color: var(--accent-strong); margin: 2px 0 8px; line-height: 1.4;
    }
    .vx-example-row { display: flex; align-items: flex-start; gap: 10px; }
    .vx-example {
      flex: 1; font-size: .88rem; font-weight: 600;
      color: #3a3a3a; line-height: 1.6; margin: 0;
    }
    .vx-translation {
      font-size: .82rem; color: var(--muted); font-weight: 600;
      line-height: 1.6; margin: 3px 0 0;
    }
    .vx-play {
      flex-shrink: 0; width: 30px; height: 30px; border-radius: 7px;
      border: 1px solid var(--line); background: var(--surface-strong);
      color: var(--muted); font: inherit; font-size: .75rem;
      cursor: pointer; display: grid; place-items: center; transition: .15s;
    }
    .vx-play:hover:not(:disabled) { border-color: var(--accent); background: #e8f4f2; color: var(--accent-strong); }
    .vx-play:disabled { opacity: .35; cursor: not-allowed; }
    .vx-no-entry {
      display: grid; place-items: center; gap: 10px;
      min-height: 160px; border: 2px dashed var(--line);
      border-radius: 10px; padding: 24px; text-align: center;
    }
    .vx-no-entry p { margin: 0; color: var(--muted); font-size: .9rem; font-weight: 700; }

    /* hide mode */
    .vx-entry-list.hide-ko .vx-meaning,
    .vx-entry-list.hide-ko .vx-translation {
      background: var(--surface-strong); color: transparent;
      border-radius: 4px; cursor: pointer; user-select: none;
    }
    .vx-entry-list.hide-ko .vx-entry.revealed .vx-meaning,
    .vx-entry-list.hide-ko .vx-entry.revealed .vx-translation {
      background: none; color: var(--accent-strong); cursor: auto;
    }
    .vx-entry-list.hide-ko .vx-entry.revealed .vx-translation { color: var(--muted); }

    /* ── quiz screen ── */
    .vx-quiz-modes { display: flex; gap: 6px; margin-bottom: 14px; }
    .vx-mode-btn {
      flex: 1; min-height: 42px; border-radius: 9px;
      border: 1px solid var(--line); background: var(--surface);
      color: var(--muted); font: inherit; font-size: .87rem;
      font-weight: 800; cursor: pointer; transition: .15s;
    }
    .vx-mode-btn:hover { border-color: var(--accent); color: var(--accent-strong); }
    .vx-mode-btn.is-active { border-color: var(--accent); background: var(--accent); color: #fff; }

    .vx-quiz-opts { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
    .vx-quiz-unit {
      min-height: 32px; padding: 0 10px; border-radius: 7px;
      border: 1px solid var(--line); background: var(--surface);
      color: var(--text); font: inherit; font-size: .82rem; font-weight: 700;
    }
    .vx-quiz-unit:focus { outline: none; border-color: var(--accent); }
    .vx-diff-stats { display: flex; gap: 10px; flex-wrap: wrap; font-size: .78rem; font-weight: 800; }
    .vx-dstat { display: flex; align-items: center; gap: 5px; color: var(--muted); }
    .vx-dstat-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* flashcard */
    .vx-card {
      border: 1px solid var(--line); border-radius: 14px;
      overflow: hidden; margin-bottom: 12px; background: var(--surface);
    }
    .vx-card-q {
      padding: 26px 22px 18px; border-bottom: 1px solid var(--line);
      min-height: 130px; display: flex; flex-direction: column; justify-content: center;
    }
    .vx-card-qlabel {
      font-size: .7rem; font-weight: 900; color: var(--muted);
      text-transform: uppercase; letter-spacing: .07em; margin-bottom: 12px;
    }
    .vx-card-qword  { font-size: clamp(1.6rem,5vw,2.1rem); font-weight: 900; margin: 0 0 8px; line-height: 1.15; }
    .vx-card-qpron  { font-size: .88rem; color: var(--muted); font-weight: 600; margin: 0 0 8px; }
    .vx-card-qsub   { font-size: .9rem; font-weight: 600; color: #3a3a3a; line-height: 1.6; margin: 0; }
    .vx-card-qko    { font-size: 1.5rem; font-weight: 900; color: var(--accent-strong); margin: 0 0 6px; }
    .vx-card-qtrs   { font-size: .88rem; color: var(--muted); margin: 0; line-height: 1.6; }
    .vx-tts-row     { display: flex; gap: 6px; margin-top: 12px; }

    .vx-card-a-wrap { padding: 14px 18px 18px; }
    .vx-reveal-btn {
      width: 100%; min-height: 76px; border-radius: 10px;
      border: 2px dashed var(--line); background: var(--surface-strong);
      color: var(--muted); font: inherit; font-size: .9rem; font-weight: 800;
      cursor: pointer; display: grid; place-items: center;
      text-align: center; padding: 16px; transition: .15s; line-height: 1.5;
    }
    .vx-reveal-btn:hover { border-color: var(--accent); background: #e8f4f2; color: var(--accent-strong); }
    .vx-answer {
      border-radius: 10px; padding: 16px;
      background: #edf7f5; border: 2px solid var(--accent);
      display: grid; gap: 5px; animation: vxpop .18s ease;
    }
    .vx-answer-label { font-size: .7rem; font-weight: 900; color: var(--accent-strong); text-transform: uppercase; letter-spacing: .07em; }
    .vx-answer-word  { font-size: clamp(1.35rem,4vw,1.8rem); font-weight: 900; margin: 0; color: var(--accent-strong); line-height: 1.2; }
    .vx-answer-pron  { font-size: .84rem; color: #3a8070; margin: 0; font-weight: 600; }
    .vx-answer-sub   { font-size: .88rem; color: #3a5e5a; line-height: 1.6; margin: 4px 0 0; }
    @keyframes vxpop { from { opacity:0; transform:translateY(5px) scale(.98); } to { opacity:1; transform:none; } }

    .vx-rating { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; animation: vxpop .2s ease; }
    .vx-rate {
      min-height: 62px; border-radius: 10px; border: 2px solid transparent;
      background: none; font: inherit; font-size: .87rem; font-weight: 900;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      transition: .15s; padding: 8px 4px;
    }
    .vx-rate .ri { font-size: 1.3rem; line-height: 1; }
    .vx-rate .rl { font-size: .75rem; font-weight: 800; }
    .vx-rate.hard   { background:#fff1f0; border-color:#ffb3ae; color:#c62828; }
    .vx-rate.medium { background:#fffde7; border-color:#ffe082; color:#e65100; }
    .vx-rate.easy   { background:#f1f8e9; border-color:#c5e1a5; color:#2e7d32; }
    .vx-rate.hard:hover   { background:#ffcdd2; }
    .vx-rate.medium:hover { background:#fff9c4; }
    .vx-rate.easy:hover   { background:#dcedc8; }
    .vx-key-hint {
      text-align:center; font-size:.74rem; font-weight:700;
      color:var(--muted); margin-top:9px; line-height:1.6;
    }
    .vx-key-hint kbd {
      display:inline-block; padding:1px 5px; border-radius:4px;
      border:1px solid var(--line); background:var(--surface-strong);
      font:inherit; font-size:.7rem;
    }

    @media (max-width:480px) {
      .vx { padding: 10px; }
      .vx-merge-opts { grid-template-columns: 1fr; }
      .vx-card-q { padding: 18px 14px 14px; }
      .vx-card-a-wrap { padding: 12px 14px 14px; }
      .vx-modal { padding: 16px; }
      .vx-cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="mini-app vx">

<!-- ══════════════════════════════════════
     MANUAL MODAL (사용설명서)
══════════════════════════════════════ -->
<div class="vx-overlay hidden" id="manual-overlay" role="dialog" aria-modal="true">
  <div class="vx-modal">
    <div class="vx-modal-head">
      <div></div>
      <button class="vx-modal-close" id="btn-modal-close" aria-label="닫기">✕</button>
    </div>
    <img src="myvoca.jpg" alt="사용설명서" style="width:100%;border-radius:10px;display:block;" />
  </div>
</div>

<main class="mini-app-panel vx-panel">

  <!-- Header -->
  <div class="vx-header">
    <div>
      <p class="eyebrow">Study</p>
      <h1>나의 단어장</h1>
    </div>
    <button class="vx-manual-btn" id="btn-open-manual">사용설명서</button>
  </div>

  <p class="vx-status" id="status-line" aria-live="polite"></p>

  <!-- Tabs -->
  <nav class="vx-tabs">
    <button class="vx-tab is-active" data-tab="upload">📁 단어장 만들기</button>
    <button class="vx-tab" data-tab="study"  id="tab-study" disabled>📖 학습</button>
    <button class="vx-tab" data-tab="quiz"   id="tab-quiz"  disabled>✏️ 퀴즈</button>
  </nav>

  <!-- ══════════════════════════════════════
       UPLOAD SCREEN
  ══════════════════════════════════════ -->
  <div id="screen-upload">
    <div class="vx-upload-grid">

      <!-- AI links + prompt copy (same row) -->
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;">
        <div class="vx-ai-links">

</main>
<script>
// ────────────────────────────────────────────────────────
// SAMPLE BOOK
// ────────────────────────────────────────────────────────
const SAMPLE = {
  title: "샘플 단어장",
  entries: [
    { word:"achieve", pronunciation:"/əˈtʃiːv/", meaning:"달성하다, 이루다",
      example:"You can achieve your goals if you work hard.",
      translation:"열심히 노력하면 목표를 달성할 수 있다." },
    { word:"imagination", pronunciation:"/ɪˌmædʒɪˈneɪʃn/", meaning:"상상력, 상상",
      example:"Children have a wonderful imagination.",
      translation:"아이들은 놀라운 상상력을 가지고 있다." },
    { word:"persist", pronunciation:"/pəˈsɪst/", meaning:"고집하다, 지속하다",
      example:"If you persist, you will eventually succeed.",
      translation:"끈기 있게 하면 결국 성공할 것이다." },
    { word:"remarkable", pronunciation:"/rɪˈmɑːrkəbl/", meaning:"놀라운, 주목할만한",
      example:"She made a remarkable recovery after the accident.",
      translation:"그녀는 사고 후 놀라운 회복을 보였다." },
  ]
};

// ────────────────────────────────────────────────────────
// STATE & STORAGE
// ────────────────────────────────────────────────────────
const SK = { BOOK: 'vx-book-v3', DIFF: 'vx-diff-v3' };
const hasTTS = 'speechSynthesis' in window;

const state = {
  book: null,
  tab: 'upload',
  uploadMode: 'replace',
  unitIndex: 0,
  studySearch: '',
  alwaysShow: true,
  quizMode: 'ko',
  quizUnitIndex: -1,
  quizCard: null,
  quizRevealed: false,
  recentIds: [],
  diff: {},
};

function saveBook() { if(state.book) localStorage.setItem(SK.BOOK, JSON.stringify(state.book)); }
function saveDiff() { localStorage.setItem(SK.DIFF, JSON.stringify(state.diff)); }
function loadData() {
  try { state.book = JSON.parse(localStorage.getItem(SK.BOOK) || 'null'); } catch { state.book = null; }
  try { state.diff = JSON.parse(localStorage.getItem(SK.DIFF) || '{}');  } catch { state.diff = {}; }
}

// ────────────────────────────────────────────────────────
// HELPERS
// ────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function esc(v) {
  return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function setStatus(msg, type='ok') {
  const el = document.getElementById('status-line');
  el.textContent = msg;
  el.className = 'vx-status' + (type==='error' ? ' error' : '');
  if (type==='ok' && msg) setTimeout(() => { if(el.textContent===msg) el.textContent=''; }, 3500);
}
function speak(text) {
  if (!hasTTS) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text); u.lang='en-US';
  window.speechSynthesis.speak(u);
}
function allEntries() {
  if (!state.book) return [];
  return state.book.units.flatMap(u => u.entries);
}
function countAll() { return allEntries().length; }

// ────────────────────────────────────────────────────────
// PROMPT BUILDER
// ────────────────────────────────────────────────────────
function buildPrompt(unitName) {
  const title = (unitName||'').trim() || '단원명';
  return `아래 사진은 영어 교재 페이지입니다.
이 페이지의 영어 단어 정보를 추출하여 JSON으로 만들어주세요.

규칙:
• 교재에 있는 내용만 사용하세요
• 예문·해석·발음기호가 없으면 절대 만들지 말고 빈 문자열("")로 두세요
• JSON만 출력하고 다른 설명은 하지 마세요

형식:
{
  "title": "${title}",
  "entries": [
    {
      "word": "영어단어",
      "pronunciation": "/발음기호/ 또는 빈 문자열",
      "meaning": "한글뜻",
      "example": "영어 예문 또는 빈 문자열",
      "translation": "한글 해석 또는 빈 문자열"
    }
  ]
}`;
}

// ────────────────────────────────────────────────────────
// MODAL
// ────────────────────────────────────────────────────────
function openManual() {
  const ov = document.getElementById('manual-overlay');
  ov.classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}
function closeManual() {
  document.getElementById('manual-overlay').classList.add('hidden');
  document.body.style.overflow = '';
}

// ────────────────────────────────────────────────────────
// NORMALIZE
// ────────────────────────────────────────────────────────
function normalize(raw) {
  if (!raw || typeof raw !== 'object') throw new Error('올바른 JSON 형식이 아닙니다.');
  const bookTitle = String(raw.title || '나의 단어장').trim();
  let units = [];

  if (Array.isArray(raw.units) && raw.units.length) {
    units = raw.units.map((u, ui) => {
      const entries = (u.entries||[]).map((e,ei) => normalizeEntry(e, ui, ei));
      return { id: uid(), title: String(u.title||`Unit ${ui+1}`).trim(), entries };
    });
  } else if (Array.isArray(raw.entries) && raw.entries.length) {
    const entries = raw.entries.map((e,ei) => normalizeEntry(e, 0, ei));
    units = [{ id: uid(), title: bookTitle, entries }];
  } else {
    throw new Error('"entries" 또는 "units" 배열이 필요합니다.');
  }

  if (!units.length || units.every(u => !u.entries.length))
    throw new Error('단어가 하나도 없습니다.');

  return { title: bookTitle, units };
}

function normalizeEntry(e, ui, ei) {
  const word = String(e.word||'').trim();
  const meaning = String(e.meaning||'').trim();
  if (!word)    throw new Error(`항목 ${ui+1}-${ei+1}: 영어 단어가 없습니다.`);
  if (!meaning) throw new Error(`"${word}": 한글 뜻이 없습니다.`);
  return {
    id: uid(), word,
    pronunciation: String(e.pronunciation||'').trim(),
    meaning,
    example:     String(e.example||'').trim(),
    translation: String(e.translation||'').trim(),
  };
}

// ────────────────────────────────────────────────────────
// FILE HANDLING
// ────────────────────────────────────────────────────────
function showFilename(name) {
  const badge = document.getElementById('drop-filename');
  const btn   = document.getElementById('drop-filename-text');
  if (name) {
    badge.textContent = '📄 ' + name; badge.hidden = false;
    btn.textContent = '📂 파일 변경';
  } else {
    badge.hidden = true;
    btn.textContent = '📂 파일 선택';
  }
}

async function handleFile(file) {
  if (!file) return;
  showFilename(file.name);
  try {
    const raw = JSON.parse(await file.text());
    const incoming = normalize(raw);
    if (state.uploadMode === 'add' && state.book) {
      state.book.units.push(...incoming.units);
      setStatus(`유닛 추가 완료! 현재 ${countAll()}개 단어`);
    } else {
      state.book = incoming;
      state.unitIndex = 0;
      setStatus(`"${state.book.title}" 불러오기 완료! ${countAll()}개 단어`);
    }
    saveBook(); renderAll(); showTab('study');
  } catch(e) { setStatus('불러오기 실패: ' + e.message, 'error'); }
  finally { document.getElementById('file-input').value = ''; }
}

// ────────────────────────────────────────────────────────
// QUIZ — WEIGHTED PICK
// ────────────────────────────────────────────────────────
function quizPool() {
  if (!state.book) return [];
  return state.quizUnitIndex === -1
    ? allEntries()
    : (state.book.units[state.quizUnitIndex]?.entries || []);
}

function pickCard() {
  const pool = quizPool(); if (!pool.length) return null;
  const maxRecent = Math.min(5, Math.floor(pool.length / 2));
  const recent = state.recentIds.slice(0, maxRecent);
  const src = pool.filter(e => !recent.includes(e.id));
  const candidates = src.length > 0 ? src : pool;
  const weights = candidates.map(e => Math.pow(state.diff[e.id]||3, 1.5));
  const total = weights.reduce((a,b) => a+b, 0);
  let r = Math.random() * total;
  for (let i=0; i<candidates.length; i++) { r -= weights[i]; if(r<=0) return candidates[i]; }
  return candidates[candidates.length-1];
}

function rateCard(level) {
  if (state.quizCard) {
    const id = state.quizCard.id;
    const cur = state.diff[id] || 3;
    if (level==='hard')      state.diff[id] = Math.min(5, cur+1);
    else if (level==='easy') state.diff[id] = Math.max(1, cur-1);
    saveDiff();
    state.recentIds = [id, ...state.recentIds].slice(0, 8);
  }
  state.quizCard = pickCard();
  state.quizRevealed = false;
  renderQuiz();
}

// ────────────────────────────────────────────────────────
// RENDER — UPLOAD
// ────────────────────────────────────────────────────────
function renderUpload() {
  const hasBook = Boolean(state.book);
  document.getElementById('merge-opts').hidden = !hasBook;
  if (hasBook) {
    document.getElementById('btn-mode-replace').className =
      'vx-merge-btn' + (state.uploadMode==='replace' ? ' primary' : '');
    document.getElementById('btn-mode-add').className =
      'vx-merge-btn' + (state.uploadMode==='add' ? ' primary' : '');
  }
}

// ────────────────────────────────────────────────────────
// RENDER — STUDY
// ────────────────────────────────────────────────────────
function renderStudy() {
  if (!state.book) return;
  const units = state.book.units;
  const sel = document.getElementById('unit-select');
  sel.innerHTML = units.map((u,i) =>
    `<option value="${i}">${esc(u.title)} (${u.entries.length})</option>`).join('');
  sel.value = String(Math.min(state.unitIndex, units.length-1));
  state.unitIndex = Number(sel.value);

  const unit = units[state.unitIndex];
  const q = state.studySearch.trim().toLowerCase();
  const entries = unit.entries.filter(e =>
    !q || [e.word,e.meaning,e.example,e.translation].join(' ').toLowerCase().includes(q));

  document.getElementById('btn-always-show').classList.toggle('is-on', state.alwaysShow);
  const list = document.getElementById('entry-list');
  list.className = 'vx-entry-list' + (state.alwaysShow ? '' : ' hide-ko');

  if (!entries.length) {
    list.innerHTML = `<div class="vx-no-entry"><p>표시할 단어가 없습니다.</p></div>`;
    return;
  }

  list.innerHTML = entries.map(e => `
    <article class="vx-entry" data-id="${esc(e.id)}">
      <div class="vx-entry-top">
        <div class="vx-entry-head">
          <span class="vx-word">${esc(e.word)}</span>
          ${e.pronunciation ? `<span class="vx-pron">${esc(e.pronunciation)}</span>` : ''}
        </div>
        <button class="vx-play" data-speak="${esc(e.word)}" ${hasTTS?'':'disabled'} title="단어 듣기">▶</button>
      </div>
      <p class="vx-meaning">${esc(e.meaning)}</p>
      ${e.example ? `
        <div class="vx-example-row">
          <p class="vx-example">${esc(e.example)}</p>
          <button class="vx-play" data-speak="${esc(e.example)}" ${hasTTS?'':'disabled'} title="예문 듣기">▶</button>
        </div>` : ''}
      ${e.translation ? `<p class="vx-translation">${esc(e.translation)}</p>` : ''}
    </article>`).join('');
}

// ────────────────────────────────────────────────────────
// RENDER — QUIZ
// ────────────────────────────────────────────────────────
function renderQuiz() {
  if (!state.book) return;
  document.querySelectorAll('[data-qmode]').forEach(b =>
    b.classList.toggle('is-active', b.dataset.qmode === state.quizMode));

  const qs = document.getElementById('quiz-unit-select');
  const units = state.book.units;
  qs.innerHTML = `<option value="-1">전체 (${countAll()}개)</option>` +
    units.map((u,i) => `<option value="${i}">${esc(u.title)} (${u.entries.length})</option>`).join('');
  qs.value = String(state.quizUnitIndex);

  const pool = quizPool();
  let easy=0, med=0, hard=0;
  pool.forEach(e => { const d=state.diff[e.id]||3; if(d<=2)easy++; else if(d===3)med++; else hard++; });
  document.getElementById('diff-stats').innerHTML = `
    <span class="vx-dstat"><span class="vx-dstat-dot" style="background:#4caf50"></span>쉬움 ${easy}개</span>
    <span class="vx-dstat"><span class="vx-dstat-dot" style="background:#ffc107"></span>보통 ${med}개</span>
    <span class="vx-dstat"><span class="vx-dstat-dot" style="background:#f44336"></span>어려움 ${hard}개</span>`;

  const area = document.getElementById('quiz-area');
  if (!pool.length) {
    area.innerHTML = `<div class="vx-no-entry"><p>단어장을 불러오면 퀴즈를 시작할 수 있어요.</p></div>`;
    return;
  }
  if (!state.quizCard) state.quizCard = pickCard();
  const e = state.quizCard; if (!e) return;

  const isKo = state.quizMode === 'ko';
  const qHtml = isKo ? `
    <p class="vx-card-qlabel">영어 단어를 보고 한국어 뜻을 맞추세요</p>
    <p class="vx-card-qword">${esc(e.word)}</p>
    ${e.pronunciation ? `<p class="vx-card-qpron">${esc(e.pronunciation)}</p>` : ''}
    ${e.example ? `<p class="vx-card-qsub">${esc(e.example)}</p>` : ''}
    <div class="vx-tts-row">
      <button class="vx-play" data-speak="${esc(e.word)}" ${hasTTS?'':'disabled'}>▶ 단어</button>
      ${e.example ? `<button class="vx-play" data-speak="${esc(e.example)}" ${hasTTS?'':'disabled'}>▶ 예문</button>` : ''}
    </div>` : `
    <p class="vx-card-qlabel">한국어 뜻을 보고 영어 단어를 맞추세요</p>
    <p class="vx-card-qko">${esc(e.meaning)}</p>
    ${e.translation ? `<p class="vx-card-qtrs">${esc(e.translation)}</p>` : ''}`;

  const aHtml = isKo ? `
    <p class="vx-answer-label">정답</p>
    <p class="vx-answer-word">${esc(e.meaning)}</p>
    ${e.translation ? `<p class="vx-answer-sub">${esc(e.translation)}</p>` : ''}` : `
    <p class="vx-answer-label">정답</p>
    <p class="vx-answer-word">${esc(e.word)}</p>
    ${e.pronunciation ? `<p class="vx-answer-pron">${esc(e.pronunciation)}</p>` : ''}
    ${e.example ? `<p class="vx-answer-sub">${esc(e.example)}</p>` : ''}
    <div class="vx-tts-row" style="margin-top:8px;">
      <button class="vx-play" data-speak="${esc(e.word)}" ${hasTTS?'':'disabled'}>▶ 단어</button>
      ${e.example ? `<button class="vx-play" data-speak="${esc(e.example)}" ${hasTTS?'':'disabled'}>▶ 예문</button>` : ''}
    </div>`;

  area.innerHTML = `
    <div class="vx-card">
      <div class="vx-card-q">${qHtml}</div>
      <div class="vx-card-a-wrap">
        ${state.quizRevealed
          ? `<div class="vx-answer">${aHtml}</div>`
          : `<button class="vx-reveal-btn" id="btn-reveal">탭하여 정답 확인<br>
              <span style="font-size:.72rem;opacity:.6">Space / Enter</span></button>`}
      </div>
    </div>
    ${state.quizRevealed ? `
      <div class="vx-rating">
        <button class="vx-rate hard"   data-rate="hard"  ><span class="ri">😰</span><span class="rl">어려워요</span></button>
        <button class="vx-rate medium" data-rate="medium"><span class="ri">🤔</span><span class="rl">애매해요</span></button>
        <button class="vx-rate easy"   data-rate="easy"  ><span class="ri">😊</span><span class="rl">알아요!</span></button>
      </div>
      <p class="vx-key-hint"><kbd>1</kbd> 어려워요 &nbsp; <kbd>2</kbd> 애매해요 &nbsp; <kbd>3</kbd> 알아요</p>` : ''}`;
}

// ────────────────────────────────────────────────────────
// RENDER ALL
// ────────────────────────────────────────────────────────
function renderAll() {
  const hasBook = Boolean(state.book);
  document.getElementById('tab-study').disabled = !hasBook;
  document.getElementById('tab-quiz').disabled  = !hasBook;
  renderUpload();
  if (state.tab === 'study') renderStudy();
  if (state.tab === 'quiz')  renderQuiz();
}

function showTab(tab) {
  state.tab = tab;
  ['upload','study','quiz'].forEach(s => {
    document.getElementById('screen-'+s).hidden = s !== tab;
  });
  document.querySelectorAll('.vx-tab').forEach(b =>
    b.classList.toggle('is-active', b.dataset.tab === tab));
  if (tab === 'study') renderStudy();
  if (tab === 'quiz')  { state.quizCard = pickCard(); state.quizRevealed = false; renderQuiz(); }
}

// ────────────────────────────────────────────────────────
// EXPORT
// ────────────────────────────────────────────────────────
function exportBook() {
  if (!state.book) return;
  const out = {
    title: state.book.title,
    units: state.book.units.map(u => ({
      title: u.title,
      entries: u.entries.map(({id:_, ...e}) => e)
    }))
  };
  const blob = new Blob([JSON.stringify(out, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (state.book.title.replace(/[\\/:*?"<>|]+/g,'-')||'vocab') + '.json';
  document.body.append(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}

// ────────────────────────────────────────────────────────
// EVENTS
// ────────────────────────────────────────────────────────

// Manual open/close
document.getElementById('btn-open-manual').addEventListener('click', openManual);
document.getElementById('btn-modal-close').addEventListener('click', closeManual);
document.getElementById('manual-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeManual();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeManual();
});

// Tabs
document.querySelectorAll('.vx-tab').forEach(b =>
  b.addEventListener('click', () => showTab(b.dataset.tab)));

// Prompt copy
document.getElementById('btn-copy-prompt').addEventListener('click', () => {
  const name = document.getElementById('unit-name-input').value;
  navigator.clipboard.writeText(buildPrompt(name))
    .then(() => setStatus('✓ 프롬프트 복사 완료! AI에게 사진과 함께 붙여넣으세요 📸'));
});

// Upload mode
document.getElementById('btn-mode-replace').addEventListener('click', () => { state.uploadMode='replace'; renderUpload(); });
document.getElementById('btn-mode-add').addEventListener('click',     () => { state.uploadMode='add';     renderUpload(); });

// File upload (secondary)
const dz = document.getElementById('drop-zone');
const fi = document.getElementById('file-input');
fi.addEventListener('change', () => handleFile(fi.files[0]));
['dragenter','dragover'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('over'); }));
['dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.remove('over'); }));
dz.addEventListener('drop', e => handleFile(e.dataTransfer.files[0]));

// Paste load
async function handlePaste(text) {
  if (!text.trim()) { setStatus('붙여넣은 내용이 없습니다.', 'error'); return; }
  try {
    const raw = JSON.parse(text);
    const incoming = normalize(raw);
    if (state.uploadMode === 'add' && state.book) {
      state.book.units.push(...incoming.units);
      setStatus(`유닛 추가 완료! 현재 ${countAll()}개 단어`);
    } else {
      state.book = incoming;
      state.unitIndex = 0;
      setStatus(`"${state.book.title}" 불러오기 완료! ${countAll()}개 단어`);
    }
    saveBook();
    document.getElementById('paste-input').value = '';
    renderAll(); showTab('study');
  } catch(e) { setStatus('불러오기 실패: ' + e.message, 'error'); }
}

document.getElementById('btn-paste-load').addEventListener('click', () => {
  handlePaste(document.getElementById('paste-input').value);
});

// Ctrl+Enter in textarea also triggers load
document.getElementById('paste-input').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    handlePaste(e.target.value);
  }
});

// Study
document.getElementById('unit-select').addEventListener('change', e => {
  state.unitIndex = Number(e.target.value); renderStudy();
});
document.getElementById('study-search').addEventListener('input', e => {
  state.studySearch = e.target.value; renderStudy();
});
document.getElementById('btn-always-show').addEventListener('click', () => {
  state.alwaysShow = !state.alwaysShow; renderStudy();
});
document.getElementById('entry-list').addEventListener('click', e => {
  const play = e.target.closest('[data-speak]');
  if (play) { e.stopPropagation(); speak(play.dataset.speak); return; }
  if (!state.alwaysShow) {
    const entry = e.target.closest('.vx-entry');
    if (entry) entry.classList.toggle('revealed');
  }
});

// Quiz mode
document.querySelectorAll('[data-qmode]').forEach(b =>
  b.addEventListener('click', () => {
    state.quizMode = b.dataset.qmode;
    state.quizCard = pickCard(); state.quizRevealed = false; renderQuiz();
  }));
document.getElementById('quiz-unit-select').addEventListener('change', e => {
  state.quizUnitIndex = Number(e.target.value);
  state.quizCard = pickCard(); state.quizRevealed = false; renderQuiz();
});
document.getElementById('btn-shuffle').addEventListener('click', () => {
  quizPool().forEach(e => { state.diff[e.id] = 3; });
  saveDiff(); state.recentIds = [];
  state.quizCard = pickCard(); state.quizRevealed = false; renderQuiz();
  setStatus('난이도를 초기화하고 섞었습니다.');
});

// Quiz area
document.getElementById('quiz-area').addEventListener('click', e => {
  if (e.target.closest('#btn-reveal')) { state.quizRevealed=true; renderQuiz(); return; }
  const rate = e.target.closest('[data-rate]');
  if (rate) { rateCard(rate.dataset.rate); return; }
  const play = e.target.closest('[data-speak]');
  if (play) { speak(play.dataset.speak); }
});

// Keyboard
document.addEventListener('keydown', e => {
  if (state.tab !== 'quiz') return;
  if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
  if (e.key===' '||e.key==='Enter') { e.preventDefault(); if(!state.quizRevealed){state.quizRevealed=true;renderQuiz();} }
  else if (e.key==='1') { if(state.quizRevealed) rateCard('hard'); }
  else if (e.key==='2') { if(state.quizRevealed) rateCard('medium'); }
  else if (e.key==='3') { if(state.quizRevealed) rateCard('easy'); }
});

// ────────────────────────────────────────────────────────
// INIT
// ────────────────────────────────────────────────────────
loadData();
renderAll();
if (state.book) showTab('study');
</script>
</body>
</html>
