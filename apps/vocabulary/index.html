<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>나의 단어장</title>
  <link rel="stylesheet" href="../../assets/styles.css" />
  <style>
    .vx       { align-items: start; padding: 16px; }
    .vx-panel { width: min(760px, 100%); }

    /* ── header ── */
    .vx-header {
      display: flex; align-items: center;
      justify-content: space-between; gap: 12px; margin-bottom: 18px;
    }
    .vx-header h1 { margin: 0; font-size: clamp(1.4rem,5vw,1.9rem); }
    .vx-manual-btn {
      flex-shrink: 0;
      min-height: 38px; padding: 0 18px; border-radius: 20px;
      border: 2px solid var(--accent); background: var(--surface);
      color: var(--accent-strong); font: inherit; font-size: .97rem; font-weight: 900;
      cursor: pointer; transition: .15s; letter-spacing: -.01em;
    }
    .vx-manual-btn:hover { background: #e8f4f2; }

    /* ── tabs ── */
    .vx-tabs {
      display: flex; border-bottom: 1px solid var(--line); margin-bottom: 24px;
    }
    .vx-tab {
      flex: 1; padding: 10px 0; background: none; border: none;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      color: var(--muted); font: inherit; font-size: .88rem; font-weight: 800;
      cursor: pointer; transition: .15s;
    }
    .vx-tab:hover:not(:disabled) { color: var(--text); }
    .vx-tab.is-active { color: var(--accent-strong); border-bottom-color: var(--accent); }
    .vx-tab:disabled { opacity: .35; cursor: not-allowed; }

    /* ── status ── */
    .vx-status {
      min-height: 20px; margin-bottom: 12px;
      font-size: .84rem; font-weight: 800; color: var(--accent-strong);
    }
    .vx-status.error { color: var(--red); }

    /* ── upload screen ── */
    .vx-upload-grid { display: grid; gap: 16px; }

    /* compact prompt row */
    .vx-prompt-row {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 12px 14px; background: var(--surface-strong);
      border: 1px solid var(--line); border-radius: 10px;
    }
    .vx-prompt-label { font-size: .8rem; font-weight: 900; color: var(--muted); white-space: nowrap; }
    .vx-unit-input {
      flex: 1; min-width: 120px; min-height: 32px; padding: 0 10px;
      border: 1px solid var(--line); border-radius: 6px;
      background: var(--surface); color: var(--text);
      font: inherit; font-size: .82rem;
    }
    .vx-unit-input:focus { outline: none; border-color: var(--accent); }
    .vx-unit-input:focus::placeholder { color: transparent; }

    /* AI links */
    .vx-ai-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }
    .vx-copy-prompt {
      min-width: 148px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .vx-ai-links {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 8px;
      margin-left: auto;
    }
    .vx-ai-link {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 13px; border-radius: 8px;
      border: 1px solid var(--line); background: var(--surface);
      color: var(--muted); font-size: .82rem; font-weight: 800;
      text-decoration: none; transition: .15s;
    }
    .vx-ai-link:hover { border-color: var(--accent); color: var(--accent-strong); background: var(--surface); }
    .vx-ai-logo { width: 28px; height: 28px; object-fit: contain; vertical-align: middle; }

    @media (max-width: 640px) {
      .vx-ai-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .vx-copy-prompt.vx-btn {
        width: 100%;
        min-height: 46px;
      }
      .vx-ai-links {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-left: 0;
      }
      .vx-ai-link {
        justify-content: center;
        min-width: 0;
        padding: 9px 6px;
        font-size: .78rem;
      }
      .vx-ai-logo {
        width: 22px;
        height: 22px;
      }
    }

    /* drop filename badge */
    .vx-drop-filename {
      display: inline-flex; align-items: center; gap: 7px;
      background: #e8f4f2; border: 1px solid var(--accent);
      border-radius: 20px; padding: 4px 12px;
      font-weight: 800; color: var(--accent-strong);
    }

    /* file upload — secondary */
    .vx-file-alt {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 12px 14px; border: 1px solid var(--line); border-radius: 10px;
      background: var(--surface-strong);
    }
    .vx-file-alt-label {
      font-size: .8rem; font-weight: 900; color: var(--muted); white-space: nowrap;
    }
    .vx-file-alt-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 8px;
      border: 1px solid var(--line); background: var(--surface);
      color: var(--muted); font-size: .83rem; font-weight: 800;
      cursor: pointer; transition: .15s; white-space: nowrap;
    }
    .vx-file-alt-btn:hover, .vx-file-alt-btn.over {
      border-color: var(--accent); background: #e8f4f2; color: var(--accent-strong);
    }

    /* merge options */
    .vx-merge-opts {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .vx-merge-btn {
      padding: 12px 10px; border-radius: 10px;
      border: 1px solid var(--line); background: var(--surface);
      color: var(--muted); font: inherit; font-size: .83rem; font-weight: 800;
      cursor: pointer; text-align: center; transition: .15s;
    }
    .vx-merge-btn:hover { border-color: var(--accent); background: #e8f4f2; color: var(--accent-strong); }
    .vx-merge-btn strong { display: block; font-size: .9rem; color: var(--text); margin-bottom: 3px; }
    .vx-merge-btn.primary { border-color: var(--accent); background: var(--accent); color: #fff; }
    .vx-merge-btn.primary strong { color: #fff; }
    .vx-merge-btn.primary:hover { background: var(--accent-strong); }

    /* generic buttons */
    .vx-btn {
      min-height: 36px; padding: 0 14px; border-radius: 8px;
      border: 1px solid var(--line); background: var(--surface);
      color: var(--muted); font: inherit; font-size: .85rem; font-weight: 800;
      cursor: pointer; transition: .15s;
    }
    .vx-btn:hover { border-color: var(--accent); background: #e8f4f2; color: var(--accent-strong); }
    .vx-btn.primary { border-color: var(--accent); background: var(--accent); color: #fff; }
    .vx-btn.primary:hover { background: var(--accent-strong); }
    .vx-btn.danger:hover { border-color: var(--red); background: #fff1f0; color: var(--red); }
    .vx-toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

    /* book-actions */
    .vx-book-actions {
      background: var(--surface-strong); border: 1px solid var(--line);
      border-radius: 10px; padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; flex-wrap: wrap;
    }
    .vx-book-actions-info { font-size: .85rem; font-weight: 800; }
    .vx-book-actions-info span { color: var(--muted); font-weight: 700; }

    /* ────────────────────────────────────────
       MANUAL MODAL (사용설명서)
    ──────────────────────────────────────── */
    .vx-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.55); backdrop-filter: blur(2px);
      display: flex; align-items: flex-start; justify-content: center;
      padding: 20px 12px; overflow-y: auto;
      animation: vxfade .2s ease;
    }
    .vx-overlay.hidden { display: none; }
    @keyframes vxfade { from { opacity:0; } to { opacity:1; } }

    .vx-modal {
      background: var(--surface); border-radius: 16px;
      width: min(560px, 100%); padding: 16px;
      animation: vxslide .22s ease;
    }
    @keyframes vxslide { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:none; } }

    .vx-modal-head {
      display: flex; align-items: center; justify-content: flex-end;
      margin-bottom: 10px;
    }
    .vx-modal-close {
      width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--line);
      background: var(--surface-strong); color: var(--muted); font: inherit;
      font-size: 1.1rem; cursor: pointer; display: grid; place-items: center; transition: .15s;
    }
    .vx-modal-close:hover { background: #ffefef; color: var(--red); border-color: #ffb3b3; }

    /* card news grid */
    .vx-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
    .vx-ccard {
      border: 1px solid var(--line); border-radius: 14px; overflow: hidden;
      background: var(--surface-strong);
    }
    /* image placeholder — square */
    .vx-ccard-img {
      aspect-ratio: 1 / 1;
      background: #f0f4f3;
      border-bottom: 1px solid var(--line);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; padding: 16px;
      border: 2px dashed #c5d9d6; border-radius: 13px 13px 0 0;
      color: #9ab8b3;
    }
    .vx-ccard-img-icon { font-size: 2.8rem; line-height: 1; opacity: .6; }
    .vx-ccard-img-label {
      font-size: .75rem; font-weight: 700; color: #9ab8b3;
      text-align: center; line-height: 1.5;
    }
    /* card body */
    .vx-ccard-body { padding: 18px; display: grid; gap: 12px; }
    .vx-ccard-num {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--accent); color: #fff;
      font-size: .9rem; font-weight: 900;
      display: grid; place-items: center; flex-shrink: 0;
    }
    .vx-ccard-head { display: flex; align-items: center; gap: 10px; }
    .vx-ccard-title { font-size: .98rem; font-weight: 900; margin: 0; line-height: 1.3; }
    .vx-ccard-desc {
      font-size: .82rem; font-weight: 700; color: var(--muted);
      line-height: 1.65; margin: 0;
    }

    /* photo tips */
    .vx-tips { display: flex; flex-wrap: wrap; gap: 6px; }
    .vx-tip {
      background: var(--surface); border: 1px solid var(--line);
      border-radius: 7px; padding: 6px 10px;
      font-size: .78rem; font-weight: 700; color: var(--muted);
    }

    /* prompt inside modal */
    .vx-prompt-wrap {
      border: 1px solid var(--line); border-radius: 10px; overflow: hidden;
    }
    .vx-prompt-head {
      background: var(--surface); padding: 9px 12px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--line); gap: 8px; flex-wrap: wrap;
    }
    .vx-prompt-head-left { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .vx-prompt-head-label { font-size: .77rem; font-weight: 900; color: var(--muted); }
    .vx-unit-input-modal {
      min-height: 28px; padding: 0 9px; border: 1px solid var(--line);
      border-radius: 5px; background: var(--surface-strong); color: var(--text);
      font: inherit; font-size: .8rem; width: 130px;
    }
    .vx-unit-input-modal:focus { outline: none; border-color: var(--accent); }
    .vx-prompt-text {
      padding: 12px 14px; font-size: .78rem; font-weight: 700; color: var(--muted);
      line-height: 1.7; white-space: pre-wrap; font-family: inherit;
      background: var(--surface-strong); margin: 0; max-height: 220px; overflow-y: auto;
    }

    /* paste zone — main */
    .vx-paste-wrap {
      display: flex; flex-direction: column; gap: 10px;
    }
    .vx-paste-area {
      width: 100%; padding: 16px; border: 2px solid var(--line);
      border-radius: 12px; background: var(--surface); color: var(--text);
      font: inherit; font-size: .88rem; line-height: 1.7; resize: vertical;
      transition: border-color .15s; min-height: 200px;
    }
    .vx-paste-area:focus { outline: none; border-color: var(--accent); }
    .vx-paste-area::placeholder { color: var(--muted); opacity: .6; font-size:.85rem; }

    /* ── study screen ── */
    .vx-study-bar {
      display: flex; gap: 8px; align-items: center;
      flex-wrap: wrap; margin-bottom: 18px;
    }
    .vx-unit-sel {
      min-height: 36px; padding: 0 10px; border-radius: 8px;
      border: 1px solid var(--line); background: var(--surface);
      color: var(--text); font: inherit; font-size: .85rem; font-weight: 700;
      flex-shrink: 0; max-width: 220px;
    }
    .vx-search {
      width: 45%; min-width: 100px; min-height: 36px; padding: 0 12px;
      border: 1px solid var(--line); border-radius: 8px;
      background: var(--surface); color: var(--text); font: inherit;
      font-size: .88rem; margin-left: auto;
    }
    .vx-search:focus, .vx-unit-sel:focus { outline: none; border-color: var(--accent); }
    @media (max-width: 640px) {
      .vx-search {
        width: 100%;
        flex-basis: 100%;
        margin-left: 0;
      }
    }
    /* edit modal */
    .vx-edit-modal {
      background: var(--surface); border-radius: 16px;
      width: min(680px, 100%); padding: 20px;
      animation: vxslide .22s ease;
      display: flex; flex-direction: column; gap: 14px;
    }
    .vx-edit-modal-head {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .vx-edit-modal-title { font-size: 1rem; font-weight: 900; margin: 0; }
    .vx-edit-modal-label {
      font-size: .82rem; font-weight: 800; color: var(--muted); margin: 0;
    }
    .vx-edit-textarea {
      width: 100%; padding: 14px; border: 2px solid var(--line);
      border-radius: 10px; background: var(--surface-strong); color: var(--text);
      font: inherit; font-size: .82rem; line-height: 1.6; resize: vertical;
      min-height: 340px; font-family: monospace; transition: border-color .15s;
      box-sizing: border-box;
    }
    .vx-edit-textarea:focus { outline: none; border-color: var(--accent); }

    /* entry cards */
    .vx-entry-list { display: grid; gap: 6px; }
    .vx-entry {
      border: 1px solid var(--line); border-radius: 10px;
      padding: 14px 16px; background: var(--surface);
      transition: border-color .15s;
    }
    .vx-entry:hover { border-color: #b8d0cc; }
    .vx-entry-top {
      display: flex; align-items: center;
      gap: 8px; margin-bottom: 4px;
    }
    .vx-entry-head { display: flex; align-items: baseline; gap: 9px; flex-wrap: wrap; flex: 1; }
    .vx-word  { font-size: 1.25rem; font-weight: 900; line-height: 1.2; }
    .vx-pron  { font-size: .82rem; color: var(--muted); font-weight: 600; }
    .vx-meaning {
      font-size: .97rem; font-weight: 800;
      color: var(--accent-strong); margin: 2px 0 8px; line-height: 1.4;
    }
    .vx-example-row { display: flex; align-items: flex-start; gap: 10px; }
    .vx-example {
      flex: 1; font-size: .88rem; font-weight: 600;
      color: #3a3a3a; line-height: 1.6; margin: 0;
    }
    .vx-translation {
      font-size: .82rem; color: var(--muted); font-weight: 600;
      line-height: 1.6; margin: 3px 0 0;
    }
    .vx-play {
      flex-shrink: 0; min-width: 58px; height: 30px; padding: 0 10px; border-radius: 7px;
      border: 1px solid var(--line); background: var(--surface-strong);
      color: var(--muted); font: inherit; font-size: .75rem; white-space: nowrap;
      cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
      gap: 4px; transition: .15s;
    }
    .vx-play:hover:not(:disabled) { border-color: var(--accent); background: #e8f4f2; color: var(--accent-strong); }
    .vx-play:disabled { opacity: .35; cursor: not-allowed; }
    .vx-play-icon { min-width: 30px; width: 30px; padding: 0; }
    .vx-no-entry {
      display: grid; place-items: center; gap: 10px;
      min-height: 160px; border: 2px dashed var(--line);
      border-radius: 10px; padding: 24px; text-align: center;
    }
    .vx-no-entry p { margin: 0; color: var(--muted); font-size: .9rem; font-weight: 700; }

    /* hide mode */
    .vx-entry-list.hide-ko .vx-meaning,
    .vx-entry-list.hide-ko .vx-translation {
      background: var(--surface-strong); color: transparent;
      border-radius: 4px; cursor: pointer; user-select: none;
    }
    .vx-entry-list.hide-ko .vx-entry.revealed .vx-meaning,
    .vx-entry-list.hide-ko .vx-entry.revealed .vx-translation {
      background: none; color: var(--accent-strong); cursor: auto;
    }
    .vx-entry-list.hide-ko .vx-entry.revealed .vx-translation { color: var(--muted); }

    /* ── entry checkbox ── */
    .vx-excl-cb {
      width: 16px; height: 16px; accent-color: var(--accent);
      cursor: pointer; flex-shrink: 0;
    }
    .vx-entry.excluded { opacity: .45; }
    .vx-excl-toast {
      position: absolute; left: 28px; top: -6px; z-index: 10;
      background: rgba(0,0,0,.7); color: #fff;
      font-size: .72rem; font-weight: 700; white-space: nowrap;
      padding: 3px 8px; border-radius: 5px; pointer-events: none;
      animation: vx-toast-fade 1.4s ease forwards;
    }
    @keyframes vx-toast-fade {
      0%   { opacity: 1; transform: translateY(0); }
      60%  { opacity: 1; transform: translateY(-4px); }
      100% { opacity: 0; transform: translateY(-8px); }
    }

    /* ── quiz screen ── */
    .vx-quiz-modes { display: flex; gap: 6px; margin-bottom: 14px; }
    .vx-mode-btn {
      flex: 1; min-height: 42px; border-radius: 9px;
      border: 1px solid var(--line); background: var(--surface);
      color: var(--muted); font: inherit; font-size: .87rem;
      font-weight: 800; cursor: pointer; transition: .15s;
    }
    .vx-mode-btn:hover { border-color: var(--accent); color: var(--accent-strong); }
    .vx-mode-btn.is-active { border-color: var(--accent); background: var(--accent); color: #fff; }

    .vx-quiz-opts { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }

    /* auto-exclude toggle switch */
    .vx-toggle-label {
      display: flex; align-items: center; gap: 7px;
      font-size: .82rem; font-weight: 700; color: var(--muted);
      cursor: pointer; user-select: none; white-space: nowrap;
    }
    .vx-toggle-label input { display: none; }
    .vx-toggle-track {
      position: relative; width: 36px; height: 20px;
      border-radius: 20px; background: var(--line);
      transition: background .2s;
    }
    .vx-toggle-track::after {
      content: ''; position: absolute;
      top: 3px; left: 3px;
      width: 14px; height: 14px;
      border-radius: 50%; background: #fff;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
      transition: transform .2s;
    }
    .vx-toggle-label input:checked + .vx-toggle-track { background: #ff9900; }
    .vx-toggle-label input:checked + .vx-toggle-track::after { transform: translateX(16px); }
    .vx-toggle-label input:checked ~ .vx-toggle-text { color: #ff9900; }
    .vx-quiz-unit {
      min-height: 32px; padding: 0 10px; border-radius: 7px;
      border: 1px solid var(--line); background: var(--surface);
      color: var(--text); font: inherit; font-size: .82rem; font-weight: 700;
    }
    .vx-quiz-unit:focus { outline: none; border-color: var(--accent); }

    /* score badge */
    .vx-quiz-score {
      margin-left: auto; font-size: .9rem; font-weight: 900;
      color: var(--accent-strong); background: #edf7f5;
      border: 1px solid var(--accent); border-radius: 20px;
      padding: 3px 14px; white-space: nowrap;
    }

    /* question card */
    .vx-qcard {
      border: 1px solid var(--line); border-radius: 14px;
      overflow: hidden; margin-bottom: 14px; background: var(--surface);
      animation: vxpop .18s ease;
    }
    .vx-qcard-head {
      padding: 22px 20px 16px;
      border-bottom: 1px solid var(--line);
      display: flex; flex-direction: column; gap: 8px; min-height: 110px;
      justify-content: center;
    }
    .vx-qcard-label {
      font-size: .7rem; font-weight: 900; color: var(--muted);
      text-transform: uppercase; letter-spacing: .07em;
    }
    .vx-qcard-word { font-size: clamp(1.5rem,5vw,2rem); font-weight: 900; margin: 0; line-height: 1.2; }
    .vx-qcard-pron { font-size: .86rem; color: var(--muted); font-weight: 600; margin: 0; }
    .vx-qcard-sub  { font-size: .88rem; color: #3a3a3a; line-height: 1.6; margin: 0; }
    .vx-qcard-ko   { font-size: 1.45rem; font-weight: 900; color: var(--accent-strong); margin: 0; }
    .vx-tts-row    { display: flex; gap: 6px; margin-top: 10px; }

    /* choices */
    .vx-choices { display: grid; gap: 8px; padding: 14px 16px 16px; }
    .vx-choice {
      width: 100%; min-height: 48px; padding: 10px 16px;
      border-radius: 10px; border: 2px solid var(--line);
      background: var(--surface); color: var(--text);
      font: inherit; font-size: .9rem; font-weight: 700;
      cursor: pointer; text-align: left; transition: .15s; line-height: 1.4;
    }
    .vx-choice:hover:not(:disabled) { border-color: var(--accent); background: #e8f4f2; }
    .vx-choice.correct { border-color: #4caf50; background: #f1f8e9; color: #2e7d32; }
    .vx-choice.wrong   { border-color: #f44336; background: #fff1f0; color: #c62828; }
    .vx-choice:disabled { cursor: default; }

    /* next button */
    .vx-next-btn {
      width: 100%; min-height: 46px; border-radius: 10px;
      border: none; background: var(--accent); color: #fff;
      font: inherit; font-size: .95rem; font-weight: 900;
      cursor: pointer; transition: .15s; animation: vxpop .2s ease;
    }
    .vx-next-btn:hover { background: var(--accent-strong); }

    /* result screen */
    .vx-result {
      border: 1px solid var(--line); border-radius: 16px;
      padding: 32px 24px; text-align: center;
      background: var(--surface); animation: vxpop .25s ease;
      display: grid; gap: 16px;
    }

<script>
// ────────────────────────────────────────────────────────
// STATE & STORAGE
// ────────────────────────────────────────────────────────
const SK = { BOOKS: 'vx-books-v4', BOOK_OLD: 'vx-book-v3', EXCL: 'vx-excl-v3' };
let activeUid = null;
const hasTTS = 'speechSynthesis' in window;

const state = {
  books: [],        // 모든 단어장 배열
  bookIndex: 0,     // 현재 선택된 단어장
  tab: 'upload',
  studySearch: '',
  quizMode: 'ko',
  quizQueue: [],
  quizCorrect: 0,
  quizTotal: 0,
  quizAnswered: false,
  quizChoices: [],
  excl: {},
  autoExcl: false,
};

function curBook() { return state.books[state.bookIndex] || null; }
function allEntries() {
  const b = curBook(); if (!b) return [];
  return b.units.flatMap(u => u.entries);
}
function countAll() { return allEntries().length; }

// cloud 헬퍼 (firebase-auth.js 로드 후 채워짐)
let _saveCloud = null, _loadCloud = null, _deleteCloud = null;

function scopedKey(base) {
  return activeUid ? `${base}:user:${activeUid}` : `${base}:anon`;
}

function resetData() {
  state.books = [];
  state.bookIndex = 0;
  state.excl = {};
}

function saveBooks() {
  localStorage.setItem(scopedKey(SK.BOOKS), JSON.stringify(state.books));
  if (activeUid && _saveCloud) _saveCloud('vocabulary/books', { books: state.books }).catch(console.error);
}
function saveExcl() {
  localStorage.setItem(scopedKey(SK.EXCL), JSON.stringify(state.excl));
  if (activeUid && _saveCloud) _saveCloud('vocabulary/excl', { excl: state.excl }).catch(console.error);
}
function loadData() {
  resetData();

  // 새 포맷 시도
  try {
    const raw = localStorage.getItem(scopedKey(SK.BOOKS));
    if (raw) { state.books = JSON.parse(raw) || []; }
  } catch { state.books = []; }

  // 구 포맷 마이그레이션 (로그인하지 않은 새 저장소에만 1회 적용)
  if (!state.books.length) {
    try {
      const old = activeUid ? null : JSON.parse(localStorage.getItem(scopedKey(SK.BOOK_OLD)) || 'null');
      if (old) { state.books = [old]; saveBooks(); }
    } catch {}
  }

  state.bookIndex = Math.min(state.bookIndex, Math.max(0, state.books.length - 1));
  try { state.excl = JSON.parse(localStorage.getItem(scopedKey(SK.EXCL)) || '{}'); } catch { state.excl = {}; }
}

// 중복 이름 처리: "UNIT 17" → "UNIT 17 (2)" → "UNIT 17 (3)"
function uniqueTitle(title) {
  const existing = state.books.map(b => b.title);
  if (!existing.includes(title)) return title;
  let n = 2;
  while (existing.includes(`${title} (${n})`)) n++;
  return `${title} (${n})`;
}

// 로그인 후 클라우드에서 불러와 로컬 + 화면에 반영
async function syncFromCloud() {
  if (!_loadCloud) return;
  try {
    const [booksData, exclData] = await Promise.all([
      _loadCloud('vocabulary/books'),
      _loadCloud('vocabulary/excl'),
    ]);
    state.books = booksData?.books?.length ? booksData.books : [];
    localStorage.setItem(scopedKey(SK.BOOKS), JSON.stringify(state.books));
    state.excl = exclData?.excl || {};
    localStorage.setItem(scopedKey(SK.EXCL), JSON.stringify(state.excl));
    state.bookIndex = 0;
    renderAll();
    showTab(state.books.length ? 'study' : 'upload');
    setStatus('☁️ 클라우드에서 단어장을 불러왔습니다.');
  } catch(e) { console.error('cloud sync failed', e); }
}

// ────────────────────────────────────────────────────────
// HELPERS
// ────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function esc(v) {
  return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function setStatus(msg, type='ok') {
  const el = document.getElementById('status-line');
  el.textContent = msg;
  el.className = 'vx-status' + (type==='error' ? ' error' : '');
  if (type==='ok' && msg) setTimeout(() => { if(el.textContent===msg) el.textContent=''; }, 3500);
}
function getBestVoice() {
  const voices = window.speechSynthesis.getVoices();
  // 선호 순서: Google US English > Microsoft > 로컬 en-US > 기타 en
  const preferred = [
    v => v.name === 'Google US English',
    v => v.name.includes('Microsoft') && v.lang.startsWith('en'),
    v => v.lang === 'en-US' && !v.name.toLowerCase().includes('compact'),
    v => v.lang.startsWith('en'),
  ];
  for (const fn of preferred) {
    const found = voices.find(fn);
    if (found) return found;
  }
  return null;
}
function speak(text) {
  if (!hasTTS) return;
  window.speechSynthesis.cancel();
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) {
    // 목소리 아직 로딩 중 — 로드 완료 후 재실행
    window.speechSynthesis.addEventListener('voiceschanged', () => speak(text), { once: true });
    return;
  }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  const voice = getBestVoice();
  if (voice) u.voice = voice;
  u.rate = 0.92;
  window.speechSynthesis.speak(u);
}

// ────────────────────────────────────────────────────────
// PROMPT BUILDER
// ────────────────────────────────────────────────────────
function buildPrompt() {
  return `아래 사진은 영어 교재 페이지입니다.
이 페이지의 영어 단어 정보를 추출하여 JSON으로 만들어주세요.

규칙:
• 교재에 있는 내용만 사용하세요
• 예문·해석·발음기호가 없으면 절대 만들지 말고 빈 문자열("")로 두세요
• JSON만 출력하고 다른 설명은 하지 마세요

형식:
{
  "entries": [
    {
      "word": "영어단어",
      "pronunciation": "/발음기호/ 또는 빈 문자열",
      "meaning": "한글뜻",
      "example": "영어 예문 또는 빈 문자열",
      "translation": "한글 해석 또는 빈 문자열"
    }
  ]
}`;
}

// ────────────────────────────────────────────────────────
// MODAL
// ────────────────────────────────────────────────────────
function openManual() {
  const ov = document.getElementById('manual-overlay');
  ov.classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}
function closeManual() {
  document.getElementById('manual-overlay').classList.add('hidden');
  document.body.style.overflow = '';
}

// ────────────────────────────────────────────────────────
// NORMALIZE
// ────────────────────────────────────────────────────────
function normalize(raw) {
  if (!raw || typeof raw !== 'object') throw new Error('올바른 JSON 형식이 아닙니다.');
  const bookTitle = String(raw.title || '나의 단어장').trim();
  let units = [];

  if (Array.isArray(raw.units) && raw.units.length) {
    units = raw.units.map((u, ui) => {
      const entries = (u.entries||[]).map((e,ei) => normalizeEntry(e, ui, ei));
      return { id: uid(), title: String(u.title||`Unit ${ui+1}`).trim(), entries };
    });
  } else if (Array.isArray(raw.entries) && raw.entries.length) {
    const entries = raw.entries.map((e,ei) => normalizeEntry(e, 0, ei));
    units = [{ id: uid(), title: bookTitle, entries }];
  } else {
    throw new Error('"entries" 또는 "units" 배열이 필요합니다.');
  }

  if (!units.length || units.every(u => !u.entries.length))
    throw new Error('단어가 하나도 없습니다.');

  return { title: bookTitle, units };
}

function normalizeEntry(e, ui, ei) {
  const word = String(e.word||'').trim();
  const meaning = String(e.meaning||'').trim();
  if (!word)    throw new Error(`항목 ${ui+1}-${ei+1}: 영어 단어가 없습니다.`);
  if (!meaning) throw new Error(`"${word}": 한글 뜻이 없습니다.`);
  return {
    id: uid(), word,
    pronunciation: String(e.pronunciation||'').trim(),
    meaning,
    example:     String(e.example||'').trim(),
    translation: String(e.translation||'').trim(),
  };
}

// ────────────────────────────────────────────────────────
// FILE HANDLING
// ────────────────────────────────────────────────────────
function showFilename(name) {
  const badge = document.getElementById('drop-filename');
  const btn   = document.getElementById('drop-filename-text');
  if (name) {
    badge.textContent = '📄 ' + name; badge.hidden = false;
    btn.textContent = '📂 파일 변경';
  } else {
    badge.hidden = true;
    btn.textContent = '📂 파일 선택';
  }
}

async function handleFile(file) {
  if (!file) return;
  const rawTitle = document.getElementById('unit-name-input').value.trim();
  if (!rawTitle) { setStatus('단어장 이름을 입력하세요.', 'error'); return; }
  try {
    const raw = JSON.parse(await file.text());
    const incoming = normalize(raw);
    const bookTitle = uniqueTitle(rawTitle);
    incoming.title = bookTitle;
    incoming.units[0].title = bookTitle;
    state.books.push(incoming);
    state.bookIndex = state.books.length - 1;
    setStatus(`"${bookTitle}" 단어장 생성 완료! ${countAll()}개 단어`);
    saveBooks(); renderAll(); showTab('study');
  } catch(e) { setStatus('불러오기 실패: ' + e.message, 'error'); }
}

// ────────────────────────────────────────────────────────
// QUIZ — MULTIPLE CHOICE
// ────────────────────────────────────────────────────────
function quizPool() {
  if (!state.books.length) return [];
  let all;
  if (state.quizUnitIndex === -1) {
    all = allEntries(); // 현재 단어장
  } else {
    const b = state.books[state.quizUnitIndex];
    all = b ? b.units.flatMap(u => u.entries) : [];
  }
  return all.filter(e => !state.excl[e.id]);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  const pool = quizPool();
  state.quizQueue = shuffle(pool.map(e => e.id));
  state.quizCorrect = 0;
  state.quizTotal = 0;
  state.quizAnswered = false;
  advanceQuiz();
}

function advanceQuiz() {
  state.quizAnswered = false;
  renderQuiz();
}

function makeChoices(correct, allEntries) {
  // 오답 보기: 같은 풀에서 랜덤 3개
  const others = shuffle(allEntries.filter(e => e.id !== correct.id)).slice(0, 3);
  const choices = shuffle([correct, ...others]);
  return choices;
}

function answerQuiz(chosenId) {
  if (state.quizAnswered) return;
  state.quizAnswered = true;
  state.quizTotal++;
  const currentId = state.quizQueue[0];
  const correct = chosenId === currentId;
  if (correct) {
    state.quizCorrect++;
    if (state.autoExcl) {
      state.excl[currentId] = true;
      saveExcl();
    }
  }
  renderQuiz();
}

function nextQuiz() {
  state.quizQueue = state.quizQueue.slice(1);
  state.quizAnswered = false;
  renderQuiz();
}

// ────────────────────────────────────────────────────────
// RENDER — UPLOAD
// ────────────────────────────────────────────────────────
function renderUpload() {
  // 이름 필드는 비워둠 — 새 단어장이므로 사용자가 직접 입력
}

// ────────────────────────────────────────────────────────
// RENDER — STUDY
// ────────────────────────────────────────────────────────
function renderStudy() {
  if (!state.books.length) return;
  // 단어장 선택 드롭다운
  const sel = document.getElementById('unit-select');
  sel.innerHTML = state.books.map((b,i) =>
    `<option value="${i}">${esc(b.title)} (${b.units.flatMap(u=>u.entries).length})</option>`).join('');
  state.bookIndex = Math.min(state.bookIndex, state.books.length - 1);
  sel.value = String(state.bookIndex);

  const book = curBook();
  const unit = book.units[0];
  const q = state.studySearch.trim().toLowerCase();
  const entries = unit.entries.filter(e =>
    !q || [e.word,e.meaning,e.example,e.translation].join(' ').toLowerCase().includes(q));


  const list = document.getElementById('entry-list');
  list.className = 'vx-entry-list';

  if (!entries.length) {
    list.innerHTML = `<div class="vx-no-entry"><p>표시할 단어가 없습니다.</p></div>`;
    return;
  }

  list.innerHTML = entries.map(e => `
    <article class="vx-entry${state.excl[e.id] ? ' excluded' : ''}" data-id="${esc(e.id)}">
      <div class="vx-entry-top">
        <label style="display:flex;align-items:center;cursor:pointer;flex-shrink:0;margin-right:10px;position:relative;">
          <input type="checkbox" class="vx-excl-cb" data-excl="${esc(e.id)}" ${state.excl[e.id]?'checked':''} />
        </label>
        <div class="vx-entry-head">
          <span class="vx-word">${esc(e.word)}</span>
          ${e.pronunciation ? `<span class="vx-pron">[${esc(e.pronunciation)}]</span>` : ''}
        </div>
        <button class="vx-play vx-play-icon" data-speak="${esc(e.word)}" ${hasTTS?'':'disabled'} title="단어 듣기">▶</button>
      </div>
      <p class="vx-meaning">${esc(e.meaning)}</p>
      ${e.example ? `
        <div class="vx-example-row">
          <p class="vx-example">${esc(e.example)}</p>
          <button class="vx-play vx-play-icon" data-speak="${esc(e.example)}" ${hasTTS?'':'disabled'} title="예문 듣기">▶</button>
        </div>` : ''}
      ${e.translation ? `<p class="vx-translation">${esc(e.translation)}</p>` : ''}
    </article>`).join('');
}

// ────────────────────────────────────────────────────────
// RENDER — QUIZ
// ────────────────────────────────────────────────────────
function renderQuiz() {
  if (!state.books.length) return;
  document.querySelectorAll('[data-qmode]').forEach(b =>
    b.classList.toggle('is-active', b.dataset.qmode === state.quizMode));

  const qs = document.getElementById('quiz-unit-select');
  qs.innerHTML = `<option value="-1">현재 단어장 전체 (${quizPool().length}개)</option>` +
    state.books.map((b,i) => {
      const cnt = b.units.flatMap(u=>u.entries).filter(e => !state.excl[e.id]).length;
      return `<option value="${i}">${esc(b.title)} (${cnt}개)</option>`;
    }).join('');
  qs.value = String(state.quizUnitIndex);

  // 점수 표시
  const scoreEl = document.getElementById('quiz-score');
  if (state.quizTotal > 0 || state.quizQueue.length > 0) {
    const done = state.quizTotal;
    const total = state.quizTotal + state.quizQueue.length;
    scoreEl.textContent = `${state.quizCorrect} / ${done} (${total}문제)`;
    scoreEl.hidden = false;
  } else {
    scoreEl.hidden = true;
  }

  const area = document.getElementById('quiz-area');
  const pool = quizPool();

  if (pool.length < 2) {
    area.innerHTML = `<div class="vx-no-entry"><p>퀴즈를 위해 최소 2개 이상의 단어가 필요합니다.</p></div>`;
    return;
  }

  // 퀴즈 세션 시작 전
  if (!state.quizQueue.length && state.quizTotal === 0) {
    area.innerHTML = `
      <div class="vx-no-entry" style="border:1px solid var(--line);border-style:solid;">
        <p>${pool.length}개 단어로 퀴즈를 시작합니다.</p>
        <button class="vx-btn primary" id="btn-quiz-start" style="min-height:42px;padding:0 28px;font-size:.95rem;">시작</button>
      </div>`;
    return;
  }

  // 퀴즈 완료
  if (!state.quizQueue.length && state.quizTotal > 0) {
    const pct = Math.round(state.quizCorrect / state.quizTotal * 100);
    const msg = pct === 100 ? '🎉 완벽해요!' : pct >= 80 ? '👍 잘했어요!' : pct >= 60 ? '😊 좋아요!' : '📚 다시 한번 도전해봐요!';
    area.innerHTML = `
      <div class="vx-result">
        <p class="vx-result-label">퀴즈 완료</p>
        <p class="vx-result-score">${state.quizCorrect}<span style="font-size:1.8rem;color:var(--muted)"> / ${state.quizTotal}</span></p>
        <p class="vx-result-msg">${msg}</p>
        <button class="vx-btn primary" id="btn-quiz-start" style="min-height:44px;font-size:.95rem;">다시 풀기</button>
      </div>`;
    return;
  }

  // 현재 문제
  const currentId = state.quizQueue[0];
  const e = pool.find(x => x.id === currentId);
  if (!e) { nextQuiz(); return; }

  // 보기 생성 (한 번만, 정답 후에도 유지)
  if (!state.quizAnswered) {
    state.quizChoices = makeChoices(e, pool);
  }
  const choices = state.quizChoices;
  const isKo = state.quizMode === 'ko';

  const qHtml = isKo ? `
    <p class="vx-qcard-label">한국어 뜻을 고르세요</p>
    <p class="vx-qcard-word">${esc(e.word)}</p>
    ${e.pronunciation ? `<p class="vx-qcard-pron">[${esc(e.pronunciation)}]</p>` : ''}
    ${e.example ? `<p class="vx-qcard-sub">${esc(e.example)}</p>` : ''}
    <div class="vx-tts-row">
      <button class="vx-play" data-speak="${esc(e.word)}" ${hasTTS?'':'disabled'}>▶ 단어</button>
      ${e.example ? `<button class="vx-play" data-speak="${esc(e.example)}" ${hasTTS?'':'disabled'}>▶ 예문</button>` : ''}
    </div>` : `
    <p class="vx-qcard-label">영어 단어를 고르세요</p>
    <p class="vx-qcard-ko">${esc(e.meaning)}</p>
    ${e.translation ? `<p class="vx-qcard-sub" style="font-size:.85rem;color:var(--muted)">${esc(e.translation)}</p>` : ''}`;

  const choicesHtml = choices.map(c => {
    const label = isKo ? esc(c.meaning) : esc(c.word);
    let cls = 'vx-choice';
    if (state.quizAnswered) {
      if (c.id === e.id) cls += ' correct';
      else if (c.id === state.quizChosen) cls += ' wrong';
    }
    return `<button class="${cls}" data-choice="${esc(c.id)}" ${state.quizAnswered?'disabled':''}>${label}</button>`;
  }).join('');

  const remaining = state.quizQueue.length;
  area.innerHTML = `
    <div class="vx-qcard">
      <div class="vx-qcard-head">${qHtml}</div>
      <div class="vx-choices">${choicesHtml}</div>
    </div>
    ${state.quizAnswered ? `<button class="vx-next-btn" id="btn-quiz-next">${remaining > 1 ? '다음 문제 →' : '결과 보기 →'}</button>` : ''}`;
}

function renderAll() {
  const hasBook = state.books.length > 0;
  document.getElementById('tab-study').disabled = !hasBook;
  document.getElementById('tab-quiz').disabled  = !hasBook;
  renderUpload();
  if (state.tab === 'study') renderStudy();
  if (state.tab === 'quiz')  renderQuiz();
}

function showTab(tab) {
  state.tab = tab;
  ['upload','study','quiz'].forEach(s => {
    document.getElementById('screen-'+s).hidden = s !== tab;
  });
  document.querySelectorAll('.vx-tab').forEach(b =>
    b.classList.toggle('is-active', b.dataset.tab === tab));
  if (tab === 'study') renderStudy();
  if (tab === 'quiz')  { state.quizQueue = []; state.quizTotal = 0; state.quizCorrect = 0; state.quizAnswered = false; renderQuiz(); }
}

// EXPORT
// ────────────────────────────────────────────────────────
function exportBook() {
  const b = curBook(); if (!b) return;
  const out = {
    title: b.title,
    units: b.units.map(u => ({
      title: u.title,
      entries: u.entries.map(({id:_, ...e}) => e)
    }))
  };
  const blob = new Blob([JSON.stringify(out, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (b.title.replace(/[\\/:*?"<>|]+/g,'-')||'vocab') + '.json';
  document.body.append(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}

// File upload (secondary) — 다중 파일 지원
const dz = document.getElementById('drop-zone');
const fi = document.getElementById('file-input');
const btnFileLoad = document.getElementById('btn-file-load');
let _pendingFiles = [];

function setFilesReady(files) {
  _pendingFiles = files ? Array.from(files) : [];
  if (_pendingFiles.length === 0) {
    showFilename(null);
    btnFileLoad.disabled = true;
  } else if (_pendingFiles.length === 1) {
    showFilename(_pendingFiles[0].name);
    const nameInput = document.getElementById('unit-name-input');
    if (!nameInput.value.trim()) nameInput.value = _pendingFiles[0].name.replace(/\.json$/i, '');
    btnFileLoad.disabled = false;
  } else {
    showFilename(`${_pendingFiles.length}개 파일 선택됨`);
    btnFileLoad.disabled = false;
  }
}

async function handleFiles(files) {
  if (!files.length) return;
  let successCount = 0, lastTitle = '';
  for (const file of files) {
    try {
      const raw = JSON.parse(await file.text());
      const incoming = normalize(raw);
      // 단어장 이름: 파일명 → 이름 입력창(파일 1개일 때만)
      const nameInput = document.getElementById('unit-name-input');
      const rawTitle = files.length === 1
        ? (nameInput.value.trim() || file.name.replace(/\.json$/i, ''))
        : file.name.replace(/\.json$/i, '');
      const bookTitle = uniqueTitle(rawTitle);
      incoming.title = bookTitle;
      incoming.units[0].title = bookTitle;
      state.books.push(incoming);
      state.bookIndex = state.books.length - 1;
      lastTitle = bookTitle;
      successCount++;
    } catch(e) {
      setStatus(`"${file.name}" 불러오기 실패: ${e.message}`, 'error');
    }
  }
  if (successCount > 0) {
    saveBooks(); renderAll(); showTab('study');
    const msg = successCount === 1
      ? `"${lastTitle}" 단어장 생성 완료! ${countAll()}개 단어`
      : `${successCount}개 단어장 생성 완료!`;
    setStatus(msg);
  }
  fi.value = '';
  _pendingFiles = [];
  btnFileLoad.disabled = true;
  showFilename(null);
}

fi.addEventListener('change', () => setFilesReady(fi.files));
btnFileLoad.addEventListener('click', () => handleFiles(_pendingFiles));
['dragenter','dragover'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('over'); }));
['dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.remove('over'); }));
dz.addEventListener('drop', e => { setFilesReady(e.dataTransfer.files); });

// Paste load
// JSON이 여러 개 붙어 있을 경우 분리해서 파싱
function parseMultipleJSON(text) {
  const results = [];
  let depth = 0, start = -1;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '{') { if (depth === 0) start = i; depth++; }
    else if (ch === '}') {
      depth--;
      if (depth === 0 && start !== -1) {
        results.push(JSON.parse(text.slice(start, i + 1)));
        start = -1;
      }
    }
  }
  if (!results.length) throw new Error('JSON을 찾을 수 없습니다.');
  return results;
}

async function handlePaste(text) {
  if (!text.trim()) { setStatus('붙여넣은 내용이 없습니다.', 'error'); return; }
  const rawTitle = document.getElementById('unit-name-input').value.trim();
  if (!rawTitle) { setStatus('단어장 이름을 입력하세요.', 'error'); return; }
  try {
    const raws = parseMultipleJSON(text);
    const books = raws.map(r => normalize(r));
    const merged = books[0];
    for (let i = 1; i < books.length; i++) {
      merged.units[0].entries.push(...books[i].units.flatMap(u => u.entries));
    }
    const bookTitle = uniqueTitle(rawTitle);
    merged.title = bookTitle;
    merged.units[0].title = bookTitle;

    state.books.push(merged);
    state.bookIndex = state.books.length - 1;
    const added = countAll();
    if (bookTitle !== rawTitle) {
      setStatus(`"${rawTitle}"이(가) 이미 있어 "${bookTitle}"로 저장했습니다. (${added}개 단어)`);
    } else {
      setStatus(`"${bookTitle}" 단어장 생성 완료! (${added}개 단어)`);
    }
    saveBooks();
    document.getElementById('paste-input').value = '';
    document.getElementById('unit-name-input').value = '';
    renderAll(); showTab('study');
  } catch(e) { setStatus('불러오기 실패: ' + e.message, 'error'); }
}

// 수정 모달 열기/닫기
function openEditModal() {
  const b = curBook(); if (!b) return;
  const unit = b.units[0];
  const out = { entries: unit.entries.map(({id:_, ...e}) => e) };
  document.getElementById('edit-json-input').value = JSON.stringify(out, null, 2);
  document.getElementById('edit-unit-name').value = b.title;
  document.getElementById('edit-modal-title').textContent = `수정 — ${b.title}`;
  document.getElementById('edit-overlay').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('edit-json-input').focus(), 50);
}
function closeEditModal() {
  document.getElementById('edit-overlay').classList.add('hidden');
  document.body.style.overflow = '';
}

// 수정 저장: JSON을 파싱해서 현재 유닛 entries 교체
function handleEditSave() {
  const text = document.getElementById('edit-json-input').value.trim();
  if (!text) { setStatus('내용이 비어있습니다.', 'error'); return; }
  try {
    const raws = parseMultipleJSON(text);
    // 모든 블록의 entries를 합쳐서 현재 유닛에 저장
    const books = raws.map(r => normalize(r));
    const newEntries = books.flatMap(b => b.units.flatMap(u => u.entries));
    const newName = document.getElementById('edit-unit-name').value.trim();
    const b = curBook();
    if (newName) { b.title = newName; b.units[0].title = newName; }
    b.units[0].entries = newEntries;
    setStatus(`저장 완료! ${newEntries.length}개 단어`);
    saveBooks();
    closeEditModal();
    renderStudy();
  } catch(e) { setStatus('저장 실패: ' + e.message, 'error'); }
}

document.getElementById('btn-paste-load').addEventListener('click', () => {
  handlePaste(document.getElementById('paste-input').value);
});

// Ctrl+Enter in textarea also triggers load
document.getElementById('paste-input').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    handlePaste(e.target.value);
  }
});

// Study — 단어장 선택
document.getElementById('unit-select').addEventListener('change', e => {
  state.bookIndex = Number(e.target.value); renderStudy();
});
document.getElementById('study-search').addEventListener('input', e => {
  state.studySearch = e.target.value; renderStudy();
});
document.getElementById('btn-study-edit').addEventListener('click', openEditModal);
document.getElementById('btn-study-delete').addEventListener('click', () => {
  const b = curBook(); if (!b) return;
  if (!confirm(`"${b.title}"을(를) 정말 삭제하시겠습니까?\n\n이 작업은 되돌릴 수 없습니다.`)) return;
  state.books.splice(state.bookIndex, 1);
  state.bookIndex = Math.max(0, state.bookIndex - 1);
  saveBooks();
  setStatus('단어장이 삭제되었습니다.');
  if (!state.books.length) { showTab('upload'); }
  else { renderAll(); }
});
document.getElementById('btn-edit-save').addEventListener('click', handleEditSave);
document.getElementById('btn-edit-cancel').addEventListener('click', closeEditModal);
document.getElementById('btn-edit-close').addEventListener('click', closeEditModal);
document.getElementById('edit-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeEditModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeManual(); closeEditModal(); }
});
document.getElementById('entry-list').addEventListener('click', e => {
  const play = e.target.closest('[data-speak]');
  if (play) { e.stopPropagation(); speak(play.dataset.speak); }
});

// Quiz mode
document.querySelectorAll('[data-qmode]').forEach(b =>
  b.addEventListener('click', () => {
    state.quizMode = b.dataset.qmode;
    state.quizQueue = []; state.quizTotal = 0; state.quizCorrect = 0; state.quizAnswered = false;
    renderQuiz();
  }));
document.getElementById('quiz-unit-select').addEventListener('change', e => {
  state.quizUnitIndex = Number(e.target.value); // -1=현재, 0~N=특정 단어장
  state.quizQueue = []; state.quizTotal = 0; state.quizCorrect = 0; state.quizAnswered = false;
  renderQuiz();
});
document.getElementById('btn-quiz-restart').addEventListener('click', () => {
  state.quizQueue = []; state.quizTotal = 0; state.quizCorrect = 0; state.quizAnswered = false;
  renderQuiz();
});

const btnAutoExcl = document.getElementById('btn-auto-excl');
btnAutoExcl.addEventListener('change', () => {
  state.autoExcl = btnAutoExcl.checked;
});

// Quiz area (delegation)
document.getElementById('quiz-area').addEventListener('click', e => {
  // start / restart
  if (e.target.closest('#btn-quiz-start')) { startQuiz(); return; }
  // next
  if (e.target.closest('#btn-quiz-next')) { nextQuiz(); return; }
  // choice
  const choiceBtn = e.target.closest('[data-choice]');
  if (choiceBtn && !state.quizAnswered) {
    state.quizChosen = choiceBtn.dataset.choice;
    answerQuiz(choiceBtn.dataset.choice);
    return;
  }
  // tts
  const play = e.target.closest('[data-speak]');
  if (play) { speak(play.dataset.speak); }
});

// Keyboard — Enter/Space to advance quiz
document.addEventListener('keydown', e => {
  if (state.tab !== 'quiz') return;
  if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
  if ((e.key===' '||e.key==='Enter') && state.quizAnswered) {
    e.preventDefault(); nextQuiz();
  }
});

// Study: checkbox (exclude from quiz)
document.getElementById('entry-list').addEventListener('change', e => {
  const cb = e.target.closest('[data-excl]');
  if (!cb) return;
  const id = cb.dataset.excl;
  if (cb.checked) state.excl[id] = true;
  else delete state.excl[id];
  saveExcl();
  const article = cb.closest('.vx-entry');
  if (article) article.classList.toggle('excluded', cb.checked);
  // 토스트 메시지
  const label = cb.closest('label');
  if (label) {
    const prev = label.querySelector('.vx-excl-toast');
    if (prev) prev.remove();
    const toast = document.createElement('span');
    toast.className = 'vx-excl-toast';
    toast.textContent = cb.checked ? '퀴즈에서 제외' : '퀴즈에 포함';
    label.appendChild(toast);
    toast.addEventListener('animationend', () => toast.remove());
  }
});

// ────────────────────────────────────────────────────────
// INIT

loadData();
renderAll();
if (state.books.length) showTab('study');
</script>
