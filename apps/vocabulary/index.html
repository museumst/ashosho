<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>나의 단어장</title>
  <link rel="stylesheet" href="../../assets/styles.css" />
  <style>
    .va       { align-items: start; padding: 16px; }
    .va-panel { width: min(640px, 100%); }

    /* ── header ── */
    .va-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 12px; margin-bottom: 20px;
    }
    .va-header h1 { margin: 0; font-size: clamp(1.4rem,5vw,1.9rem); }
    .va-count {
      display: inline-block; margin-top: 6px;
      background: var(--surface-strong); border: 1px solid var(--line);
      border-radius: 999px; padding: 4px 12px;
      font-size: .8rem; font-weight: 800; color: var(--muted);
      white-space: nowrap;
    }

    /* ── add bar ── */
    .va-add-row {
      display: flex; gap: 8px; align-items: stretch;
    }
    .va-input {
      flex: 1; min-height: 48px; padding: 0 14px;
      border: 2px solid var(--accent); border-radius: 10px;
      background: var(--surface); color: var(--text);
      font: inherit; font-size: 1rem;
      transition: box-shadow .15s;
    }
    .va-input:focus { outline: none; box-shadow: 0 0 0 3px rgba(79,160,145,.2); }
    .va-input::placeholder { color: var(--muted); font-weight: 600; }
    .va-add-btn {
      min-width: 72px; min-height: 48px; padding: 0 18px;
      border: none; border-radius: 10px;
      background: var(--accent); color: #fff;
      font: inherit; font-size: .95rem; font-weight: 900;
      cursor: pointer; transition: background .15s;
    }
    .va-add-btn:hover { background: var(--accent-strong); }
    .va-hint {
      margin: 7px 0 0; font-size: .8rem; font-weight: 700;
      color: var(--muted); line-height: 1.5;
    }

    /* ── status ── */
    .va-status {
      min-height: 20px; margin: 8px 0 0;
      font-size: .84rem; font-weight: 800; color: var(--accent-strong);
    }
    .va-status.error { color: var(--red); }

    /* ── tabs ── */
    .va-tabs {
      display: flex; border-bottom: 1px solid var(--line); margin: 16px 0 20px;
    }
    .va-tab {
      flex: 1; padding: 10px 0; background: none; border: none;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      color: var(--muted); font: inherit; font-size: .9rem; font-weight: 800;
      cursor: pointer; transition: .15s;
    }
    .va-tab:hover { color: var(--text); }
    .va-tab.is-active { color: var(--accent-strong); border-bottom-color: var(--accent); }

    /* ── word list ── */
    .va-list { display: grid; gap: 8px; }
    .va-word-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 12px;
      border: 1px solid var(--line); border-radius: 10px;
      padding: 14px 14px 14px 16px;
      background: var(--surface); transition: border-color .15s;
    }
    .va-word-item:hover { border-color: #b0cec8; }
    .va-word-main { min-width: 0; }
    .va-word-en {
      font-size: 1.25rem; font-weight: 900; margin: 0;
      line-height: 1.2; overflow-wrap: anywhere;
    }
    .va-word-ko {
      font-size: .95rem; font-weight: 700; color: var(--muted);
      margin: 4px 0 0;
    }
    .va-word-ex {
      font-size: .82rem; font-weight: 600; color: #5a7a75;
      margin: 6px 0 0; line-height: 1.55;
    }
    .va-word-tr { font-size: .8rem; color: var(--muted); margin: 2px 0 0; line-height: 1.55; }
    .va-word-side {
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 6px; flex-shrink: 0;
    }
    .va-diff {
      display: flex; gap: 3px; align-items: center;
    }
    .va-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--line);
    }
    .va-dot.on-1 { background: #4caf50; }
    .va-dot.on-2 { background: #8bc34a; }
    .va-dot.on-3 { background: #ffc107; }
    .va-dot.on-4 { background: #ff7043; }
    .va-dot.on-5 { background: #f44336; }
    .va-del {
      width: 28px; height: 28px; border-radius: 6px;
      border: 1px solid transparent; background: none;
      color: var(--muted); font: inherit; font-size: .9rem;
      cursor: pointer; display: grid; place-items: center;
      transition: .15s;
    }
    .va-del:hover { border-color: var(--red); background: #fff1f0; color: var(--red); }

    /* ── empty ── */
    .va-empty {
      display: grid; place-items: center; gap: 10px;
      min-height: 180px; border: 2px dashed var(--line);
      border-radius: 12px; padding: 32px; text-align: center;
    }
    .va-empty p { margin: 0; color: var(--muted); font-size: .9rem; font-weight: 700; }

    /* ── quiz ── */
    .va-quiz-top {
      display: flex; gap: 4px; margin-bottom: 16px;
    }
    .va-mode-btn {
      flex: 1; min-height: 40px; border-radius: 8px;
      border: 1px solid var(--line); background: var(--surface);
      color: var(--muted); font: inherit; font-size: .85rem;
      font-weight: 800; cursor: pointer; transition: .15s;
    }
    .va-mode-btn:hover { border-color: var(--accent); color: var(--accent-strong); }
    .va-mode-btn.is-active {
      border-color: var(--accent); background: var(--accent); color: #fff;
    }

    /* quiz stats bar */
    .va-stats {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
      font-size: .78rem; font-weight: 800;
    }
    .va-stat { display: flex; align-items: center; gap: 5px; color: var(--muted); }
    .va-stat-dot {
      width: 9px; height: 9px; border-radius: 50%;
    }

    /* flashcard */
    .va-card {
      border: 1px solid var(--line); border-radius: 14px;
      overflow: hidden; margin-bottom: 14px;
    }
    .va-card-q {
      padding: 28px 24px 20px;
      background: var(--surface); border-bottom: 1px solid var(--line);
      min-height: 140px; display: flex; flex-direction: column;
      justify-content: center;
    }
    .va-card-label {
      font-size: .72rem; font-weight: 900; color: var(--muted);
      text-transform: uppercase; letter-spacing: .07em; margin-bottom: 14px;
    }
    .va-card-word {
      font-size: clamp(1.6rem, 5vw, 2.2rem); font-weight: 900;
      margin: 0 0 10px; line-height: 1.15;
    }
    .va-card-sub {
      font-size: .95rem; font-weight: 700; color: #4a6e68;
      line-height: 1.6; margin: 0;
    }
    .va-card-tts {
      display: inline-flex; align-items: center; gap: 5px;
      margin-top: 12px; min-height: 32px; padding: 0 12px;
      border: 1px solid var(--line); border-radius: 8px;
      background: var(--surface-strong); color: var(--muted);
      font: inherit; font-size: .8rem; font-weight: 800;
      cursor: pointer; transition: .15s; align-self: flex-start;
    }
    .va-card-tts:hover:not(:disabled) {
      border-color: var(--accent); background: #e8f4f2; color: var(--accent-strong);
    }
    .va-card-tts:disabled { opacity: .4; cursor: not-allowed; }

    .va-reveal-wrap { padding: 16px 20px 20px; }
    .va-reveal-btn {
      width: 100%; min-height: 80px; border-radius: 10px;
      border: 2px dashed var(--line); background: var(--surface-strong);
      color: var(--muted); font: inherit; font-size: .92rem; font-weight: 800;
      cursor: pointer; display: grid; place-items: center;
      transition: .15s; text-align: center; padding: 16px;
      line-height: 1.5;
    }
    .va-reveal-btn:hover {
      border-color: var(--accent); background: #e8f4f2;
      color: var(--accent-strong);
    }
    .va-answer {
      border-radius: 10px; padding: 18px;
      background: #edf7f5; border: 2px solid var(--accent);
      display: grid; gap: 6px;
      animation: va-pop .18s ease;
    }
    .va-answer-label {
      font-size: .72rem; font-weight: 900; color: var(--accent-strong);
      text-transform: uppercase; letter-spacing: .07em;
    }
    .va-answer-word {
      font-size: clamp(1.4rem,4vw,1.9rem); font-weight: 900;
      margin: 0; color: var(--accent-strong); line-height: 1.2;
    }
    .va-answer-sub {
      font-size: .9rem; font-weight: 700; color: #3a5e5a;
      line-height: 1.6; margin: 0;
    }
    @keyframes va-pop {
      from { opacity: 0; transform: translateY(6px) scale(.98); }
      to   { opacity: 1; transform: none; }
    }

    /* rating buttons */
    .va-rating {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 8px; animation: va-pop .2s ease;
    }
    .va-rate-btn {
      min-height: 60px; border-radius: 10px;
      border: 2px solid transparent; background: none;
      font: inherit; font-size: .88rem; font-weight: 900;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      transition: .15s; padding: 8px 4px;
    }
    .va-rate-btn .va-rate-icon { font-size: 1.4rem; line-height: 1; }
    .va-rate-btn .va-rate-label { font-size: .75rem; font-weight: 800; }
    .va-rate-btn.hard {
      background: #fff1f0; border-color: #ffb3ae; color: #c62828;
    }
    .va-rate-btn.hard:hover { background: #ffcdd2; border-color: #ef9a9a; }
    .va-rate-btn.medium {
      background: #fffde7; border-color: #ffe082; color: #e65100;
    }
    .va-rate-btn.medium:hover { background: #fff9c4; border-color: #ffd54f; }
    .va-rate-btn.easy {
      background: #f1f8e9; border-color: #c5e1a5; color: #2e7d32;
    }
    .va-rate-btn.easy:hover { background: #dcedc8; border-color: #aed581; }

    /* keyboard hint */
    .va-key-hint {
      text-align: center; font-size: .75rem; font-weight: 700;
      color: var(--muted); margin-top: 10px; line-height: 1.6;
    }
    .va-key-hint kbd {
      display: inline-block; padding: 1px 5px; border-radius: 4px;
      border: 1px solid var(--line); background: var(--surface-strong);
      font: inherit; font-size: .72rem;
    }

    /* no-words quiz state */
    .va-quiz-empty {
      display: grid; place-items: center; gap: 10px;
      min-height: 220px; padding: 32px; text-align: center;
      border: 2px dashed var(--line); border-radius: 12px;
    }
    .va-quiz-empty p { margin: 0; color: var(--muted); font-weight: 700; }

    @media (max-width: 480px) {
      .va { padding: 10px; }
      .va-card-q { padding: 20px 16px 16px; }
      .va-reveal-wrap { padding: 12px 14px 16px; }
    }
  </style>
</head>
<body class="mini-app va">

    <div class="va-header">

        <p class="eyebrow">Study</p>

    <!-- ── Add bar ── -->
    <div class="va-add-row">

             type="text" autocomplete="off" spellcheck="false"

    <p class="va-hint">쉼표로 구분: <strong>영어단어, 한글뜻</strong> &nbsp;·&nbsp; 예문은 자동 완성됩니다</p>

      <button class="va-tab" data-tab="quiz">✏️ 퀴즈</button>

    <!-- ── Word list ── -->
    <div id="tab-list">
      <div class="va-list" id="word-list"></div>
    </div>

    <!-- ── Quiz ── -->
    <div id="tab-quiz" hidden>
      <div class="va-quiz-top">
        <button class="va-mode-btn is-active" data-qmode="ko">🇰🇷 한국어 맞추기</button>
        <button class="va-mode-btn" data-qmode="en">🇬🇧 영어 맞추기</button>
      </div>
      <div class="va-stats" id="quiz-stats"></div>
      <div id="quiz-area"></div>
    </div>

  </main>

  // ─────────────────────────────────────────────────────────
  // STATE
  // ─────────────────────────────────────────────────────────
  const STORAGE_KEY = 'ashosho-vocab-v2';
  const hasTTS = 'speechSynthesis' in window;

  const state = {
    words: [],       // { id, word, meaning, example, translation, difficulty }
    tab: 'list',
    quizMode: 'ko',
    quizCard: null,
    quizRevealed: false,
    recentIds: [],   // avoid immediate repeat
  };

  // difficulty: 1(easy) ~ 5(hard), starts at 3
  // selection weight = difficulty^1.5

  // ─────────────────────────────────────────────────────────
  // PERSISTENCE
  // ─────────────────────────────────────────────────────────
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.words));
  }
  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      state.words = raw ? JSON.parse(raw) : [];
    } catch { state.words = []; }
  }

  // ─────────────────────────────────────────────────────────
  // HELPERS
  // ─────────────────────────────────────────────────────────
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

  function esc(v) {
    return String(v ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setStatus(msg, type = 'ok') {
    const el = document.getElementById('status-line');
    el.textContent = msg;
    el.className = 'va-status' + (type === 'error' ? ' error' : '');
    if (type === 'ok' && msg) setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 3000);
  }

  function speak(text) {
    if (!hasTTS) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US';
    window.speechSynthesis.speak(u);
  }

  function diffLabel(d) {
    return ['', '매우 쉬움', '쉬움', '보통', '어려움', '매우 어려움'][d] || '보통';
  }
  function diffColor(d) {
    return ['', '#4caf50','#8bc34a','#ffc107','#ff7043','#f44336'][d] || '#ffc107';
  }

  // ─────────────────────────────────────────────────────────
  // ADD WORD
  // ─────────────────────────────────────────────────────────
  function parseInput(raw) {
    // Split by comma; also accept tab as delimiter
    const parts = raw.split(/,|\t/).map(s => s.trim()).filter(Boolean);
    if (!parts.length) return null;
    const word = parts[0];
    const meaning = parts[1] || '';
    const db = BANK[word.toLowerCase()];
    const example     = parts[2] || db?.e || '';
    const translation = parts[3] || db?.t || '';
    return { word, meaning, example, translation, fromDb: Boolean(db && !parts[2]) };
  }

  function addWord() {
    const input = document.getElementById('word-input');
    const raw = input.value.trim();
    if (!raw) return;

    const parsed = parseInput(raw);
    if (!parsed) { setStatus('입력값을 확인해 주세요.', 'error'); return; }
    if (!parsed.meaning) {
      setStatus(`💡 한글 뜻을 함께 입력해 주세요.  예: ${parsed.word}, 사과`, 'error');
      return;
    }
    // Check duplicate
    if (state.words.some(w => w.word.toLowerCase() === parsed.word.toLowerCase())) {
      setStatus(`"${parsed.word}"은(는) 이미 단어장에 있습니다.`, 'error');
      return;
    }

    state.words.unshift({
      id: uid(),
      word: parsed.word,
      meaning: parsed.meaning,
      example: parsed.example,
      translation: parsed.translation,
      difficulty: 3,
    });
    save();
    input.value = '';
    input.focus();

    const msg = parsed.fromDb
      ? `✓ "${parsed.word}" 추가됨 — 예문 자동완성`
      : `✓ "${parsed.word}" 추가됨`;
    setStatus(msg);
    renderAll();
  }

  // ─────────────────────────────────────────────────────────
  // QUIZ — WEIGHTED PICK
  // ─────────────────────────────────────────────────────────
  function pickCard() {
    if (!state.words.length) return null;
    // Exclude recently seen (up to half the list, max 5)
    const maxRecent = Math.min(5, Math.floor(state.words.length / 2));
    const recent = state.recentIds.slice(0, maxRecent);
    const pool = state.words.filter(w => !recent.includes(w.id));
    const src = pool.length > 0 ? pool : state.words;

    // Weighted random by difficulty^1.5
    const weights = src.map(w => Math.pow(w.difficulty, 1.5));
    const total = weights.reduce((a, b) => a + b, 0);
    let r = Math.random() * total;
    for (let i = 0; i < src.length; i++) {
      r -= weights[i];
      if (r <= 0) return src[i];
    }
    return src[src.length - 1];
  }

  function rateCard(level) {
    // level: 'hard' | 'medium' | 'easy'
    const w = state.words.find(x => x.id === state.quizCard?.id);
    if (w) {
      if (level === 'hard')   w.difficulty = Math.min(5, w.difficulty + 1);
      else if (level === 'easy') w.difficulty = Math.max(1, w.difficulty - 1);
      save();
    }
    if (state.quizCard) {
      state.recentIds = [state.quizCard.id, ...state.recentIds].slice(0, 8);
    }
    state.quizCard    = pickCard();
    state.quizRevealed = false;
    renderQuiz();
  }

  // ─────────────────────────────────────────────────────────
  // RENDER — WORD LIST
  // ─────────────────────────────────────────────────────────
  function renderList() {
    const list = document.getElementById('word-list');
    const count = document.getElementById('word-count');
    count.textContent = state.words.length ? `${state.words.length}개 단어` : '단어 없음';

    if (!state.words.length) {
      list.innerHTML = `<div class="va-empty">
        <span style="font-size:2.5rem">📖</span>
        <p>아직 단어가 없어요.<br>위 입력창에서 단어를 추가해 보세요!</p>
        <p style="font-size:.8rem;color:var(--muted)">예: apple, 사과</p>
      </div>`;
      return;
    }

    list.innerHTML = state.words.map(w => {
      const dc = diffColor(w.difficulty);
      const dots = Array.from({length: 5}, (_, i) =>
        `<span class="va-dot${i < w.difficulty ? ' on-' + w.difficulty : ''}"
               style="${i < w.difficulty ? `background:${dc}` : ''}"></span>`
      ).join('');
      return `<div class="va-word-item" data-id="${esc(w.id)}">
        <div class="va-word-main">
          <p class="va-word-en">${esc(w.word)}</p>
          <p class="va-word-ko">${esc(w.meaning)}</p>
          ${w.example ? `<p class="va-word-ex">${esc(w.example)}</p>` : ''}
          ${w.translation ? `<p class="va-word-tr">${esc(w.translation)}</p>` : ''}
        </div>
        <div class="va-word-side">
          <button class="va-del" data-del="${esc(w.id)}" title="삭제">✕</button>
          <div class="va-diff" title="${diffLabel(w.difficulty)}">${dots}</div>
        </div>
      </div>`;
    }).join('');
  }

  // ─────────────────────────────────────────────────────────
  // RENDER — QUIZ
  // ─────────────────────────────────────────────────────────
  function renderQuiz() {
    // mode buttons
    document.querySelectorAll('[data-qmode]').forEach(b =>
      b.classList.toggle('is-active', b.dataset.qmode === state.quizMode));

    // stats bar
    const stats = document.getElementById('quiz-stats');
    const counts = [0, 0, 0]; // easy(1-2), medium(3), hard(4-5)
    state.words.forEach(w => {
      if (w.difficulty <= 2) counts[0]++;
      else if (w.difficulty === 3) counts[1]++;
      else counts[2]++;
    });
    stats.innerHTML = `
      <span class="va-stat"><span class="va-stat-dot" style="background:#4caf50"></span>쉬움 ${counts[0]}개</span>
      <span class="va-stat"><span class="va-stat-dot" style="background:#ffc107"></span>보통 ${counts[1]}개</span>
      <span class="va-stat"><span class="va-stat-dot" style="background:#f44336"></span>어려움 ${counts[2]}개</span>
    `;

    const area = document.getElementById('quiz-area');

    if (!state.words.length) {
      area.innerHTML = `<div class="va-quiz-empty">
        <span style="font-size:2.5rem">✏️</span>
        <p>단어를 추가하면 바로 퀴즈를 시작할 수 있어요!</p>
      </div>`;
      return;
    }

    if (!state.quizCard) state.quizCard = pickCard();
    if (!state.quizCard) return;

    const w = state.quizCard;
    const isKo = state.quizMode === 'ko';

    // Question side
    let qLabel, qWord, qSub, showTts;
    if (isKo) {
      qLabel  = '영어 단어를 보고 한국어 뜻을 맞추세요';
      qWord   = w.word;
      qSub    = w.example || '';
      showTts = true;
    } else {
      qLabel  = '한국어 뜻을 보고 영어 단어를 맞추세요';
      qWord   = w.meaning;
      qSub    = w.translation || '';
      showTts = false;
    }

    // Answer side
    let aWord, aSub;
    if (isKo) {
      aWord = w.meaning;
      aSub  = w.translation || '';
    } else {
      aWord = w.word;
      aSub  = w.example || '';
    }

    const revealHtml = state.quizRevealed
      ? `<div class="va-answer">
          <p class="va-answer-label">정답</p>
          <p class="va-answer-word">${esc(aWord)}</p>
          ${aSub ? `<p class="va-answer-sub">${esc(aSub)}</p>` : ''}
          ${!isKo && w.word ? `<div style="margin-top:8px;display:flex;gap:6px;">
            <button class="va-card-tts" data-speak="${esc(w.word)}" ${hasTTS?'':'disabled'}>🔊 단어 듣기</button>
            ${w.example ? `<button class="va-card-tts" data-speak="${esc(w.example)}" ${hasTTS?'':'disabled'}>🔊 예문 듣기</button>` : ''}
          </div>` : ''}
        </div>`
      : `<button class="va-reveal-btn" id="btn-reveal">
          탭하여 정답 확인<br>
          <span style="font-size:.75rem;font-weight:700;opacity:.7">Space / Enter</span>
        </button>`;

    const ratingHtml = state.quizRevealed
      ? `<div class="va-rating" style="margin-top:12px;">
          <button class="va-rate-btn hard" data-rate="hard">
            <span class="va-rate-icon">😰</span>
            <span class="va-rate-label">어려워요</span>
          </button>
          <button class="va-rate-btn medium" data-rate="medium">
            <span class="va-rate-icon">🤔</span>
            <span class="va-rate-label">애매해요</span>
          </button>
          <button class="va-rate-btn easy" data-rate="easy">
            <span class="va-rate-icon">😊</span>
            <span class="va-rate-label">알아요!</span>
          </button>
        </div>
        <p class="va-key-hint"><kbd>1</kbd> 어려워요 &nbsp; <kbd>2</kbd> 애매해요 &nbsp; <kbd>3</kbd> 알아요</p>`
      : '';

    area.innerHTML = `
      <div class="va-card">
        <div class="va-card-q">
          <p class="va-card-label">${esc(qLabel)}</p>
          <p class="va-card-word">${esc(qWord)}</p>
          ${qSub ? `<p class="va-card-sub">${esc(qSub)}</p>` : ''}
          ${showTts ? `<div style="display:flex;gap:6px;margin-top:10px;">
            <button class="va-card-tts" data-speak="${esc(w.word)}" ${hasTTS?'':'disabled'}>🔊 단어 듣기</button>
            ${w.example ? `<button class="va-card-tts" data-speak="${esc(w.example)}" ${hasTTS?'':'disabled'}>🔊 예문 듣기</button>` : ''}
          </div>` : ''}
        </div>
        <div class="va-reveal-wrap">${revealHtml}</div>
      </div>
      ${ratingHtml}
    `;
  }

  // ─────────────────────────────────────────────────────────
  // RENDER ALL
  // ─────────────────────────────────────────────────────────
  function renderAll() {
    renderList();
    if (state.tab === 'quiz') renderQuiz();
  }

  function showTab(tab) {
    state.tab = tab;
    document.getElementById('tab-list').hidden = tab !== 'list';
    document.getElementById('tab-quiz').hidden = tab !== 'quiz';
    document.querySelectorAll('.va-tab').forEach(b =>
      b.classList.toggle('is-active', b.dataset.tab === tab));
    if (tab === 'quiz') {
      if (!state.quizCard) state.quizCard = pickCard();
      state.quizRevealed = false;
      renderQuiz();
    }
  }

  // ─────────────────────────────────────────────────────────
  // EVENTS
  // ─────────────────────────────────────────────────────────

  // Add word
  document.getElementById('btn-add').addEventListener('click', addWord);
  document.getElementById('word-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addWord(); }
  });

  // Tabs
  document.querySelectorAll('.va-tab').forEach(b =>
    b.addEventListener('click', () => showTab(b.dataset.tab)));

  // Quiz mode
  document.querySelectorAll('[data-qmode]').forEach(b =>
    b.addEventListener('click', () => {
      state.quizMode = b.dataset.qmode;
      state.quizCard = pickCard();
      state.quizRevealed = false;
      renderQuiz();
    }));

  // Word list: delete
  document.getElementById('word-list').addEventListener('click', e => {
    const del = e.target.closest('[data-del]');
    if (!del) return;
    const id = del.dataset.del;
    const w = state.words.find(x => x.id === id);
    if (!w) return;
    state.words = state.words.filter(x => x.id !== id);
    // Remove from quiz if currently shown
    if (state.quizCard?.id === id) {
      state.quizCard = pickCard();
      state.quizRevealed = false;
    }
    save(); renderAll();
    setStatus(`"${w.word}" 삭제됨`);
  });

  // Quiz area: reveal + rate + tts
  document.getElementById('quiz-area').addEventListener('click', e => {
    if (e.target.closest('#btn-reveal')) {
      state.quizRevealed = true; renderQuiz(); return;
    }
    const rateBtn = e.target.closest('[data-rate]');
    if (rateBtn) { rateCard(rateBtn.dataset.rate); return; }
    const ttsBtn = e.target.closest('[data-speak]');
    if (ttsBtn) { speak(ttsBtn.dataset.speak); }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (state.tab !== 'quiz') return;
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      if (!state.quizRevealed) { state.quizRevealed = true; renderQuiz(); }
    } else if (e.key === '1') { if (state.quizRevealed) rateCard('hard'); }
    else if (e.key === '2')   { if (state.quizRevealed) rateCard('medium'); }
    else if (e.key === '3')   { if (state.quizRevealed) rateCard('easy'); }
  });

  // ─────────────────────────────────────────────────────────
  // INIT
  // ─────────────────────────────────────────────────────────
  load();
  renderAll();
  </script>
</body>
</html>
