<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>명상 사운드 플레이어</title>
    <style>
      :root {
        --background: #17171b;
        --panel: #232327;
        --panel-soft: #111218;
        --active-panel: #24263a;
        --icon: #9ca3b4;
        --accent: #4ade80;
        --accent-soft: rgba(74, 222, 128, 0.2);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        overflow-x: hidden;
        background: var(--background);
      }

      body {
        display: grid;
        place-items: start center;
        color: #fff;
        font-family:
          Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }

      button {
        font: inherit;
      }

      .app {
        width: min(100vw, 620px);
        max-width: 100%;
        min-height: 100vh;
        overflow-x: hidden;
        padding: clamp(20px, 8vh, 88px) clamp(22px, 5vw, 52px) 56px;
        background: var(--background);
        --music-tile-size: min(58vw, 238px);
      }

      .sound-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .music-carousel {
        display: flex;
        gap: clamp(12px, 3.5vw, 18px);
        width: 100%;
        max-width: 100%;
        min-width: 0;
        overflow-x: auto;
        padding-inline: calc((100% - var(--music-tile-size)) / 2);
        scroll-padding-inline: calc((100% - var(--music-tile-size)) / 2);
        scroll-snap-type: x mandatory;
        scrollbar-width: none;
        mask-image: linear-gradient(90deg, transparent 0%, rgba(0,0,0,0.2) 7%, #000 22%, #000 78%, rgba(0,0,0,0.2) 93%, transparent 100%);
        -webkit-mask-image: linear-gradient(90deg, transparent 0%, rgba(0,0,0,0.2) 7%, #000 22%, #000 78%, rgba(0,0,0,0.2) 93%, transparent 100%);
        -webkit-overflow-scrolling: touch;
      }

      .music-carousel::-webkit-scrollbar {
        display: none;
      }

      .music-slide {
        display: grid;
        min-width: 0;
        flex: 0 0 var(--music-tile-size);
        place-items: center;
        scroll-snap-align: center;
      }

      .music-tile {
        position: relative;
        display: block;
        width: 100%;
        aspect-ratio: 1;
        overflow: hidden;
        border: 4px solid transparent;
        border-radius: clamp(28px, 7vw, 42px);
        padding: 0;
        background: #222;
        cursor: pointer;
        box-shadow: none;
      }

      .music-tile img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .music-tile.is-playing {
        border-color: var(--accent);
        box-shadow:
          0 0 0 2px rgba(74, 222, 128, 0.38),
          0 0 24px rgba(74, 222, 128, 0.16);
      }

      .music-tile:focus-visible,
      .sound-tile:focus-visible {
        outline: 3px solid rgba(74, 222, 128, 0.62);
        outline-offset: 4px;
      }

      .sound-grid {
        margin-top: clamp(24px, 6vw, 38px);
        gap: clamp(14px, 4vw, 24px);
      }

      .sound-tile {
        position: relative;
        display: grid;
        aspect-ratio: 1;
        place-items: center;
        overflow: hidden;
        border: 0;
        border-radius: clamp(24px, 5vw, 38px);
        background: var(--panel);
        color: var(--icon);
        cursor: ns-resize;
        touch-action: none;
      }

      .sound-fill {
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        height: 0;
        background: var(--fill-color, var(--accent-soft));
        will-change: height;
      }

      .sound-icon {
        position: relative;
        z-index: 1;
        display: grid;
        place-items: center;
      }

      .sound-icon svg {
        width: clamp(48px, 12vw, 72px);
        height: clamp(48px, 12vw, 72px);
        stroke: currentColor;
        stroke-width: 2.15;
      }

      .error {
        min-height: 20px;
        margin: 18px 0 0;
        color: #fb7185;
        font-size: 13px;
        font-weight: 700;
        text-align: center;
      }

      @media (max-width: 420px) {
        .app {
          padding: max(28px, env(safe-area-inset-top)) 22px 36px;
          --music-tile-size: min(58vw, 227px);
        }
      }

      @media (min-width: 760px) {
        html,
        body {
          height: 100%;
          min-height: 100vh;
          overflow: hidden;
          background: #050507;
        }

        body {
          place-items: center;
          padding: 32px;
        }

        .app {
          width: 430px;
          min-height: 0;
          height: min(844px, calc(100dvh - 64px));
          overflow: hidden;
          border: 1px solid rgba(255, 255, 255, 0.08);
          border-radius: 44px;
          box-shadow:
            0 28px 80px rgba(0, 0, 0, 0.5),
            inset 0 1px 0 rgba(255, 255, 255, 0.04);
          padding: 56px 22px 36px;
          --music-tile-size: 238px;
        }
      }

      @media (min-width: 760px) and (max-height: 780px) {
        body {
          padding: 20px;
        }

        .app {
          width: min(430px, calc((100dvh - 40px) * 0.56));
          height: calc(100dvh - 40px);
          padding: clamp(28px, 5.2vh, 44px) 20px clamp(20px, 3.4vh, 28px);
          --music-tile-size: min(220px, 30vh);
        }

        .sound-grid {
          margin-top: clamp(18px, 3.2vh, 28px);
          gap: clamp(10px, 2.2vh, 16px);
        }

        .sound-icon svg {
          width: clamp(42px, 9vh, 58px);
          height: clamp(42px, 9vh, 58px);
        }

        .error {
          margin-top: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app" aria-label="명상 사운드 플레이어">
      <section class="music-carousel" id="music-carousel" aria-label="배경음악"></section>

      <section class="sound-grid" id="sound-grid" aria-label="수딩 사운드"></section>
      <p class="error" id="error-line" aria-live="polite"></p>
    </main>

    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script>
      const ASSET_REPO_REF = "ce01be2fd08a46e424020da8179e93ec9c489dda";
      const ASSET_CDN_BASE_URL = `https://cdn.jsdelivr.net/gh/museumst/worrystone-assets@${ASSET_REPO_REF}`;
      const SOUND_BASE_URL = `${ASSET_CDN_BASE_URL}/sound`;
      const BGM_BASE_URL = `${ASSET_CDN_BASE_URL}/bgm`;
      const BGM_ART_BASE_URL = `${ASSET_CDN_BASE_URL}/bgm-art`;

      const ambientSounds = [
        { id: "rain", label: "빗소리", icon: "cloud-rain-wind", accentColor: "#5A9FE0", uri: `${SOUND_BASE_URL}/rain.mp3` },
        { id: "wind", label: "바람소리", icon: "wind", accentColor: "#78B5CE", uri: `${SOUND_BASE_URL}/wind.mp3` },
        { id: "fire", label: "모닥불소리", icon: "flame-kindling", accentColor: "#D96F45", uri: `${SOUND_BASE_URL}/fire.mp3` },
        { id: "bugs", label: "풀벌레", icon: "bug", accentColor: "#72B54F", uri: `${SOUND_BASE_URL}/bugs.mp3` },
        { id: "birds", label: "새소리", icon: "bird", accentColor: "#C99A38", uri: `${SOUND_BASE_URL}/birds.mp3` },
        { id: "waves", label: "파도소리", icon: "waves", accentColor: "#3BA8A0", uri: `${SOUND_BASE_URL}/waves.mp3` },
        { id: "cafe", label: "카페소리", icon: "coffee", accentColor: "#A0845C", uri: `${SOUND_BASE_URL}/cafe.mp3` },
        { id: "walk", label: "산책소리", icon: "footprints", accentColor: "#7EAA72", uri: `${SOUND_BASE_URL}/walk.mp3` },
        { id: "smallriver", label: "시냇물", icon: "fish-symbol", accentColor: "#4E9BB5", uri: `${SOUND_BASE_URL}/smallriver.mp3` },
      ];

      const bgmTracks = Array.from({ length: 9 }, (_, index) => {
        const number = index + 1;
        return {
          id: String(number),
          title: `BGM ${number}`,
          uri: `${BGM_BASE_URL}/${number}.mp3`,
          artworkUri: `${BGM_ART_BASE_URL}/${number}.jpeg`,
        };
      });

      const state = {
        currentTrackIndex: -1,
        playing: false,
        activeSoundPointerId: null,
        activeSoundTile: null,
        ambientLevels: Object.fromEntries(ambientSounds.map((sound) => [sound.id, 0])),
      };

      const dom = {
        musicCarousel: document.querySelector("#music-carousel"),
        soundGrid: document.querySelector("#sound-grid"),
        errorLine: document.querySelector("#error-line"),
      };

      const musicAudio = new Audio();
      musicAudio.crossOrigin = "anonymous";
      musicAudio.preload = "metadata";
      musicAudio.setAttribute("playsinline", "");

      const ambientAudioElements = new Map();
      let soundViewRafId = 0;
      let musicCarouselSettleTimer = 0;

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function hexToRgb(hex) {
        const normalized = hex.replace("#", "");
        const safeHex = normalized.length === 3
          ? normalized.split("").map((char) => `${char}${char}`).join("")
          : normalized;
        const value = Number.parseInt(safeHex, 16);
        return {
          r: (value >> 16) & 255,
          g: (value >> 8) & 255,
          b: value & 255,
        };
      }

      function mixHexColor(from, to, ratio) {
        const clampedRatio = clamp(ratio, 0, 1);
        const left = hexToRgb(from);
        const right = hexToRgb(to);
        const toHex = (value) => Math.round(value).toString(16).padStart(2, "0");
        return `#${toHex(left.r + (right.r - left.r) * clampedRatio)}${toHex(left.g + (right.g - left.g) * clampedRatio)}${toHex(left.b + (right.b - left.b) * clampedRatio)}`;
      }

      function currentTrack() {
        return bgmTracks[state.currentTrackIndex] || null;
      }

      function updateMusicTiles() {
        document.querySelectorAll(".music-tile").forEach((tile) => {
          const isCurrent = Number(tile.dataset.trackIndex) === state.currentTrackIndex;
          tile.classList.toggle("is-playing", isCurrent && state.playing);
          tile.setAttribute("aria-pressed", String(isCurrent && state.playing));
        });
      }

      async function playTrack(index) {
        try {
          if (state.currentTrackIndex === index && state.playing) {
            musicAudio.pause();
            state.playing = false;
            updateMusicTiles();
            return;
          }

          state.currentTrackIndex = index;
          musicAudio.src = bgmTracks[index].uri;
          await musicAudio.play();
          state.playing = true;
          scrollMusicTileIntoView(index);
          updateMusicTiles();
          updateMediaSession();
        } catch (error) {
          state.playing = false;
          updateMusicTiles();
          showError("음악을 재생하지 못했어요.");
        }
      }

      function nextTrack() {
        if (state.currentTrackIndex < 0) return;
        playTrack((state.currentTrackIndex + 1) % bgmTracks.length);
      }

      function ensureAmbient(sound) {
        if (ambientAudioElements.has(sound.id)) {
          return ambientAudioElements.get(sound.id);
        }

        const audio = new Audio(sound.uri);
        audio.crossOrigin = "anonymous";
        audio.loop = true;
        audio.preload = "auto";
        audio.volume = 0;
        audio.setAttribute("playsinline", "");
        audio.addEventListener("error", () => {
          showError(`${sound.label} 파일을 불러오지 못했어요.`);
        });
        ambientAudioElements.set(sound.id, audio);
        return audio;
      }

      function applyAmbientLevel(soundId) {
        const audio = ambientAudioElements.get(soundId);
        if (!audio) return;
        const level = clamp(state.ambientLevels[soundId] || 0, 0, 1);
        audio.volume = level;
        if (level === 0) {
          audio.pause();
        }
      }

      function updateSoundTileViews() {
        ambientSounds.forEach((sound) => {
          const level = state.ambientLevels[sound.id] || 0;
          const iconColor = mixHexColor("#9CA3B4", sound.accentColor, level);
          const fillColor = mixHexColor("#232327", sound.accentColor, 0.5);
          document.querySelectorAll(`.sound-tile[data-sound-id="${sound.id}"]`).forEach((tile) => {
            tile.style.color = iconColor;
            tile.style.setProperty("--fill-color", fillColor);
            tile.setAttribute("aria-label", `${sound.label} ${Math.round(level * 100)}%`);
            tile.setAttribute("aria-valuenow", String(Math.round(level * 100)));
            tile.querySelector(".sound-fill").style.height = `${level * 100}%`;
          });
        });
      }

      function setAmbientLevel(soundId, level) {
        const sound = ambientSounds.find((item) => item.id === soundId);
        if (!sound) return;
        state.ambientLevels[soundId] = clamp(level, 0, 1);
        if (state.ambientLevels[soundId] > 0) {
          const audio = ensureAmbient(sound);
          applyAmbientLevel(soundId);
          if (audio.paused) {
            audio.play().catch(() => showError("사운드를 재생하지 못했어요."));
          }
        } else {
          applyAmbientLevel(soundId);
        }
        if (!soundViewRafId) {
          soundViewRafId = requestAnimationFrame(() => {
            soundViewRafId = 0;
            updateSoundTileViews();
          });
        }
      }

      function setLevelFromPointer(tile, clientY) {
        const rect = tile.getBoundingClientRect();
        const nextLevel = clamp(1 - (clientY - rect.top) / Math.max(rect.height, 1), 0, 1);
        setAmbientLevel(tile.dataset.soundId, nextLevel);
      }

      function renderMusicTiles() {
        const carouselTracks = [bgmTracks[bgmTracks.length - 1], ...bgmTracks, bgmTracks[0]];
        dom.musicCarousel.innerHTML = carouselTracks.map((track, visualIndex) => {
          const trackIndex = visualIndex === 0
            ? bgmTracks.length - 1
            : visualIndex === carouselTracks.length - 1
              ? 0
              : visualIndex - 1;
          return `
          <div class="music-slide">
            <button class="music-tile" type="button" data-track-index="${trackIndex}" aria-label="${track.title}" aria-pressed="false">
              <img src="${track.artworkUri}" alt="" loading="eager" />
            </button>
          </div>
        `;
        }).join("");
      }

      function scrollMusicTileIntoView(index, behavior = "smooth") {
        centerMusicVisualIndex(index + 1, behavior);
      }

      function centerMusicVisualIndex(visualIndex, behavior = "smooth") {
        const slide = dom.musicCarousel.children[visualIndex];
        if (!slide) return;
        const left = slide.offsetLeft - dom.musicCarousel.offsetLeft - (dom.musicCarousel.clientWidth - slide.offsetWidth) / 2;
        dom.musicCarousel.scrollTo({ left, behavior });
      }

      function centerInitialMusicTile() {
        requestAnimationFrame(() => {
          centerMusicVisualIndex(1, "auto");
        });
      }

      function closestMusicVisualIndex() {
        const slides = [...dom.musicCarousel.children];
        const center = dom.musicCarousel.scrollLeft + dom.musicCarousel.clientWidth / 2;
        return slides.reduce((closestIndex, slide, index) => {
          const slideCenter = slide.offsetLeft - dom.musicCarousel.offsetLeft + slide.offsetWidth / 2;
          const closestCenter = slides[closestIndex].offsetLeft - dom.musicCarousel.offsetLeft + slides[closestIndex].offsetWidth / 2;
          return Math.abs(slideCenter - center) < Math.abs(closestCenter - center) ? index : closestIndex;
        }, 0);
      }

      function normalizeMusicCarouselLoop() {
        const visualIndex = closestMusicVisualIndex();
        if (visualIndex === 0) {
          centerMusicVisualIndex(bgmTracks.length, "auto");
        } else if (visualIndex === bgmTracks.length + 1) {
          centerMusicVisualIndex(1, "auto");
        }
      }

      function renderSoundTiles() {
        dom.soundGrid.innerHTML = ambientSounds.map((sound) => `
          <button
            class="sound-tile"
            type="button"
            data-sound-id="${sound.id}"
            aria-label="${sound.label} 0%"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
          >
            <span class="sound-fill"></span>
            <span class="sound-icon"><i data-lucide="${sound.icon}"></i></span>
          </button>
        `).join("");
      }

      function showError(message) {
        dom.errorLine.textContent = message;
      }

      function refreshLucideIcons() {
        if (!window.lucide) return;
        window.lucide.createIcons({
          attrs: {
            "aria-hidden": "true",
          },
        });
      }

      function updateMediaSession() {
        if (!("mediaSession" in navigator) || typeof MediaMetadata === "undefined") return;
        const track = currentTrack();
        if (!track) return;
        navigator.mediaSession.metadata = new MediaMetadata({
          title: track.title,
          artist: "명상 사운드 플레이어",
          artwork: [{ src: track.artworkUri, sizes: "512x512", type: "image/jpeg" }],
        });
        navigator.mediaSession.setActionHandler("play", () => playTrack(state.currentTrackIndex < 0 ? 0 : state.currentTrackIndex));
        navigator.mediaSession.setActionHandler("pause", () => {
          musicAudio.pause();
          state.playing = false;
          updateMusicTiles();
        });
        navigator.mediaSession.setActionHandler("nexttrack", nextTrack);
        navigator.mediaSession.setActionHandler("previoustrack", () => {
          if (state.currentTrackIndex < 0) return;
          playTrack((state.currentTrackIndex + bgmTracks.length - 1) % bgmTracks.length);
        });
      }

      function bindEvents() {
        dom.musicCarousel.addEventListener("click", (event) => {
          const tile = event.target.closest(".music-tile");
          if (!tile) return;
          showError("");
          playTrack(Number(tile.dataset.trackIndex));
        });

        dom.musicCarousel.addEventListener("scroll", () => {
          window.clearTimeout(musicCarouselSettleTimer);
          musicCarouselSettleTimer = window.setTimeout(normalizeMusicCarouselLoop, 80);
        });

        dom.musicCarousel.addEventListener("scrollend", () => {
          window.clearTimeout(musicCarouselSettleTimer);
          normalizeMusicCarouselLoop();
        });

        dom.soundGrid.addEventListener("pointerdown", (event) => {
          const tile = event.target.closest(".sound-tile");
          if (!tile) return;
          showError("");
          event.preventDefault();
          state.activeSoundPointerId = event.pointerId;
          state.activeSoundTile = tile;
          tile.setPointerCapture?.(event.pointerId);
          setLevelFromPointer(tile, event.clientY);
        });

        dom.soundGrid.addEventListener("pointermove", (event) => {
          if (event.pointerId !== state.activeSoundPointerId || !state.activeSoundTile) return;
          event.preventDefault();
          setLevelFromPointer(state.activeSoundTile, event.clientY);
        });

        const clearSoundPointer = (event) => {
          if (event.pointerId !== state.activeSoundPointerId) return;
          state.activeSoundPointerId = null;
          state.activeSoundTile = null;
        };

        dom.soundGrid.addEventListener("pointerup", clearSoundPointer);
        dom.soundGrid.addEventListener("pointercancel", clearSoundPointer);
        dom.soundGrid.addEventListener("lostpointercapture", clearSoundPointer);

        if (!window.PointerEvent) {
          dom.soundGrid.addEventListener("touchstart", (event) => {
            const touch = event.touches[0];
            const tile = event.target.closest(".sound-tile");
            if (!touch || !tile) return;
            event.preventDefault();
            showError("");
            state.activeSoundTile = tile;
            setLevelFromPointer(tile, touch.clientY);
          }, { passive: false });

          dom.soundGrid.addEventListener("touchmove", (event) => {
            const touch = event.touches[0];
            if (!touch || !state.activeSoundTile) return;
            event.preventDefault();
            setLevelFromPointer(state.activeSoundTile, touch.clientY);
          }, { passive: false });

          dom.soundGrid.addEventListener("touchend", () => {
            state.activeSoundTile = null;
          });
          dom.soundGrid.addEventListener("touchcancel", () => {
            state.activeSoundTile = null;
          });
        }

        musicAudio.addEventListener("ended", () => {
          state.playing = false;
          nextTrack();
        });
        musicAudio.addEventListener("pause", () => {
          if (!musicAudio.ended) {
            state.playing = false;
            updateMusicTiles();
          }
        });
        musicAudio.addEventListener("error", () => {
          state.playing = false;
          updateMusicTiles();
          showError("음악 파일을 불러오지 못했어요.");
        });

        document.addEventListener("visibilitychange", () => {
          if (document.hidden) return;
          ambientSounds.forEach((sound) => {
            if ((state.ambientLevels[sound.id] || 0) > 0) {
              const audio = ambientAudioElements.get(sound.id);
              if (audio && audio.paused) {
                audio.play().catch(() => {});
              }
            }
          });
        });
      }

      function preloadBgmArtwork() {
        bgmTracks.forEach((track) => {
          const img = new Image();
          img.src = track.artworkUri;
        });
      }

      function init() {
        renderMusicTiles();
        centerInitialMusicTile();
        renderSoundTiles();
        refreshLucideIcons();
        updateSoundTileViews();
        bindEvents();
        preloadBgmArtwork();
      }

      init();
    </script>
  </body>
</html>
