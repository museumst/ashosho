<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Harmony</title>
    <link rel="stylesheet" href="../../assets/styles.css?v=20260518-harmony" />
    <style>
      body.harmony-app {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.74), rgba(239, 246, 244, 0.96)),
          var(--bg);
      }

      .harmony-panel {
        width: min(860px, 100%);
      }

      .harmony-header {
        display: flex;
        gap: 16px;
        align-items: end;
        justify-content: space-between;
      }

      .harmony-status {
        min-width: 7.5rem;
        margin: 0 0 6px;
        color: var(--accent-strong);
        font-size: 1rem;
        font-weight: 900;
        text-align: right;
      }

      .chord-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin: 26px 0 0;
      }

      .chord-button {
        min-height: 58px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-strong);
        color: var(--text);
        cursor: pointer;
        font-size: 1.15rem;
        font-weight: 900;
        touch-action: manipulation;
        user-select: none;
        transition:
          background 0.12s ease,
          border-color 0.12s ease,
          color 0.12s ease,
          transform 0.12s ease;
      }

      .chord-button:hover,
      .chord-button:focus-visible,
      .chord-button.is-active,
      .chord-button.is-playing {
        border-color: var(--accent);
        background: #dff3ef;
        color: var(--accent-strong);
        outline: none;
      }

      .chord-button:active {
        transform: translateY(1px);
      }

      .keyboard {
        position: relative;
        display: grid;
        grid-template-columns: repeat(11, minmax(0, 1fr));
        height: clamp(230px, 36vw, 340px);
        margin: 32px 0 0;
        border: 1px solid #111827;
        border-radius: 8px;
        overflow: hidden;
        background: #111827;
      }

      .key {
        position: relative;
        border: 0;
        border-right: 1px solid #cbd5d1;
        cursor: pointer;
        font: inherit;
        touch-action: none;
        user-select: none;
      }

      .key.white {
        z-index: 1;
        display: flex;
        align-items: end;
        justify-content: center;
        padding: 0 4px 14px;
        background: #fffefa;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 800;
      }

      .key.white:last-child {
        border-right: 0;
      }

      .key.black {
        position: absolute;
        z-index: 3;
        top: 0;
        width: 7.2%;
        height: 62%;
        border: 1px solid #101418;
        border-top: 0;
        border-radius: 0 0 6px 6px;
        background: linear-gradient(180deg, #171b21, #050608);
        color: #cbd5d1;
        transform: translateX(-50%);
      }

      .key.black span {
        position: absolute;
        right: 0;
        bottom: 12px;
        left: 0;
        font-size: 0.72rem;
        font-weight: 800;
      }

      .key.is-pressed.white {
        background: #b7ebe0;
        color: #073f3b;
        box-shadow: inset 0 10px 0 rgba(15, 118, 110, 0.22);
      }

      .key.is-pressed.black {
        background: linear-gradient(180deg, #0f766e, #084d48);
        color: #ecfdf5;
        box-shadow: inset 0 -8px 0 rgba(255, 255, 255, 0.12);
      }

      .key:focus-visible {
        outline: 3px solid var(--yellow);
        outline-offset: -3px;
      }

      .harmony-notes {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        min-height: 38px;
        margin: 20px 0 0;
      }

      .note-chip {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 7px 10px;
        background: var(--surface-strong);
        color: var(--text);
        font-size: 0.86rem;
        font-weight: 900;
      }

      @media (max-width: 700px) {
        .harmony-app {
          padding: 14px;
        }

        .harmony-panel {
          padding: 18px;
        }

        .harmony-header {
          display: grid;
          align-items: start;
        }

        .harmony-status {
          text-align: left;
        }

        .chord-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .key.black {
          width: 8%;
        }
      }
    </style>
  </head>
  <body class="mini-app harmony-app">
    <main class="mini-app-panel harmony-panel">
      <div class="harmony-header">
        <div>
          <p class="eyebrow">Music</p>
          <h1>Harmony</h1>
        </div>
        <p class="harmony-status" id="status">C Major</p>
      </div>

      <div class="chord-grid" id="chord-grid" aria-label="코드 선택"></div>
      <div class="keyboard" id="keyboard" aria-label="건반"></div>
      <div class="harmony-notes" id="notes" aria-live="polite"></div>
    </main>

    <script>
      const chords = [
        { name: "C Major", notes: ["C4", "E4", "G4"] },
        { name: "D Minor", notes: ["D4", "F4", "A4"] },
        { name: "E Minor", notes: ["E4", "G4", "B4"] },
        { name: "F Major", notes: ["F4", "A4", "C5"] },
        { name: "G Major", notes: ["G4", "B4", "D5"] },
        { name: "A Minor", notes: ["A4", "C5", "E5"] },
        { name: "B Dim", notes: ["B4", "D5", "F5"] },
        { name: "C Major 7", notes: ["C4", "E4", "G4", "B4"] },
      ];

      const keys = [
        { note: "C4", type: "white", label: "C" },
        { note: "C#4", type: "black", label: "C#", after: 1 },
        { note: "D4", type: "white", label: "D" },
        { note: "D#4", type: "black", label: "D#", after: 2 },
        { note: "E4", type: "white", label: "E" },
        { note: "F4", type: "white", label: "F" },
        { note: "F#4", type: "black", label: "F#", after: 4 },
        { note: "G4", type: "white", label: "G" },
        { note: "G#4", type: "black", label: "G#", after: 5 },
        { note: "A4", type: "white", label: "A" },
        { note: "A#4", type: "black", label: "A#", after: 6 },
        { note: "B4", type: "white", label: "B" },
        { note: "C5", type: "white", label: "C" },
        { note: "C#5", type: "black", label: "C#", after: 8 },
        { note: "D5", type: "white", label: "D" },
        { note: "D#5", type: "black", label: "D#", after: 9 },
        { note: "E5", type: "white", label: "E" },
        { note: "F5", type: "white", label: "F" },
      ];

      const noteFrequency = {
        C4: 261.63,
        "C#4": 277.18,
        D4: 293.66,
        "D#4": 311.13,
        E4: 329.63,
        F4: 349.23,
        "F#4": 369.99,
        G4: 392,
        "G#4": 415.3,
        A4: 440,
        "A#4": 466.16,
        B4: 493.88,
        C5: 523.25,
        "C#5": 554.37,
        D5: 587.33,
        "D#5": 622.25,
        E5: 659.25,
        F5: 698.46,
      };

      const chordGrid = document.querySelector("#chord-grid");
      const keyboard = document.querySelector("#keyboard");
      const notesOutput = document.querySelector("#notes");
      const statusOutput = document.querySelector("#status");
      let audioContext;
      let masterInput;
      let selectedChord = chords[0];
      const activeSources = new Map();
      const activeVoices = new Map();
      const releaseTimers = new Map();

      function getAudioContext() {
        if (!audioContext) {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) return null;
          audioContext = new AudioContextClass();

          const compressor = audioContext.createDynamicsCompressor();
          compressor.threshold.setValueAtTime(-24, audioContext.currentTime);
          compressor.knee.setValueAtTime(24, audioContext.currentTime);
          compressor.ratio.setValueAtTime(8, audioContext.currentTime);
          compressor.attack.setValueAtTime(0.006, audioContext.currentTime);
          compressor.release.setValueAtTime(0.18, audioContext.currentTime);

          const delay = audioContext.createDelay();
          const feedback = audioContext.createGain();
          const wet = audioContext.createGain();
          masterInput = audioContext.createGain();

          delay.delayTime.setValueAtTime(0.14, audioContext.currentTime);
          feedback.gain.setValueAtTime(0.18, audioContext.currentTime);
          wet.gain.setValueAtTime(0.12, audioContext.currentTime);
          masterInput.gain.setValueAtTime(0.68, audioContext.currentTime);

          masterInput.connect(compressor);
          masterInput.connect(delay);
          delay.connect(feedback);
          feedback.connect(delay);
          delay.connect(wet);
          wet.connect(compressor);
          compressor.connect(audioContext.destination);
        }
        return audioContext;
      }

      function startNote(note) {
        if (activeVoices.has(note)) return;
        const context = getAudioContext();
        if (!context || !noteFrequency[note]) return;

        const now = context.currentTime;
        const frequency = noteFrequency[note];
        const filter = context.createBiquadFilter();
        const envelope = context.createGain();
        const bodyGain = context.createGain();
        const warmGain = context.createGain();
        const edgeGain = context.createGain();
        const body = context.createOscillator();
        const warm = context.createOscillator();
        const edge = context.createOscillator();

        filter.type = "lowpass";
        filter.Q.setValueAtTime(0.9, now);
        filter.frequency.setValueAtTime(Math.min(4200, frequency * 8), now);
        filter.frequency.exponentialRampToValueAtTime(Math.min(2600, frequency * 4.2), now + 0.32);

        envelope.gain.setValueAtTime(0.0001, now);
        envelope.gain.exponentialRampToValueAtTime(0.18, now + 0.028);
        envelope.gain.exponentialRampToValueAtTime(0.115, now + 0.42);

        body.type = "triangle";
        body.frequency.setValueAtTime(frequency, now);
        body.detune.setValueAtTime(-4, now);
        bodyGain.gain.setValueAtTime(0.72, now);

        warm.type = "sine";
        warm.frequency.setValueAtTime(frequency, now);
        warm.detune.setValueAtTime(5, now);
        warmGain.gain.setValueAtTime(0.52, now);

        edge.type = "sawtooth";
        edge.frequency.setValueAtTime(frequency * 2, now);
        edge.detune.setValueAtTime(2, now);
        edgeGain.gain.setValueAtTime(0.045, now);

        body.connect(bodyGain);
        warm.connect(warmGain);
        edge.connect(edgeGain);
        bodyGain.connect(envelope);
        warmGain.connect(envelope);
        edgeGain.connect(envelope);
        envelope.connect(filter);
        filter.connect(masterInput);

        body.start(now);
        warm.start(now);
        edge.start(now);
        activeVoices.set(note, { oscillators: [body, warm, edge], envelope, filter });
      }

      function stopNote(note) {
        const voice = activeVoices.get(note);
        if (!voice || !audioContext) return;

        const now = audioContext.currentTime;
        voice.envelope.gain.cancelScheduledValues(now);
        voice.envelope.gain.setTargetAtTime(0.0001, now, 0.22);
        voice.filter.frequency.cancelScheduledValues(now);
        voice.filter.frequency.setTargetAtTime(620, now, 0.2);
        voice.oscillators.forEach((oscillator) => oscillator.stop(now + 0.95));
        activeVoices.delete(note);
      }

      function updatePressedKeys(notes) {
        document.querySelectorAll(".key").forEach((key) => {
          key.classList.toggle("is-pressed", notes.includes(key.dataset.note));
        });
        document.querySelectorAll(".chord-button").forEach((button) => {
          const isPlaying = [...activeSources.values()].some(
            (source) => source.chordName === button.dataset.chord
          );
          button.classList.toggle("is-playing", isPlaying);
        });
      }

      async function resumeAudio() {
        const context = getAudioContext();
        if (!context) return false;
        if (context.state === "suspended") {
          await context.resume();
        }
        return true;
      }

      function getHeldNotes() {
        return [...new Set([...activeSources.values()].flatMap((source) => source.notes))];
      }

      function syncHeldNotes() {
        const heldNotes = getHeldNotes();
        heldNotes.forEach(startNote);
        [...activeVoices.keys()].forEach((note) => {
          if (!heldNotes.includes(note)) stopNote(note);
        });
        updatePressedKeys(heldNotes);
      }

      async function holdNotes(sourceId, notes, chordName = "") {
        clearTimeout(releaseTimers.get(sourceId));
        releaseTimers.delete(sourceId);
        activeSources.set(sourceId, { notes, chordName, startedAt: Date.now() });
        syncHeldNotes();
        await resumeAudio();
        syncHeldNotes();
      }

      function releaseNotes(sourceId) {
        const source = activeSources.get(sourceId);
        if (!source) return;

        const heldFor = Date.now() - source.startedAt;
        if (heldFor < 120) {
          clearTimeout(releaseTimers.get(sourceId));
          releaseTimers.set(
            sourceId,
            setTimeout(() => {
              activeSources.delete(sourceId);
              releaseTimers.delete(sourceId);
              syncHeldNotes();
            }, 120 - heldFor)
          );
          return;
        }

        activeSources.delete(sourceId);
        syncHeldNotes();
      }

      function selectChord(chord) {
        selectedChord = chord;
        renderChords();
        renderNotes();
        updatePressedKeys(getHeldNotes());
      }

      function renderChords() {
        chordGrid.innerHTML = chords
          .map(
            (chord) => `
              <button
                class="chord-button ${chord.name === selectedChord.name ? "is-active" : ""}"
                type="button"
                data-chord="${chord.name}"
                aria-pressed="${chord.name === selectedChord.name ? "true" : "false"}"
              >
                ${chord.name}
              </button>
            `
          )
          .join("");
      }

      function renderKeyboard() {
        const whiteKeys = keys.filter((key) => key.type === "white");
        const blackKeys = keys.filter((key) => key.type === "black");
        keyboard.innerHTML = [
          ...whiteKeys.map(
            (key) => `
              <button class="key white" type="button" data-note="${key.note}" aria-label="${key.note}">
                <span>${key.label}</span>
              </button>
            `
          ),
          ...blackKeys.map((key) => {
            const left = (key.after / 11) * 100;
            return `
              <button
                class="key black"
                style="left: ${left}%"
                type="button"
                data-note="${key.note}"
                aria-label="${key.note}"
              >
                <span>${key.label}</span>
              </button>
            `;
          }),
        ].join("");
      }

      function renderNotes() {
        statusOutput.textContent = selectedChord.name;
        notesOutput.innerHTML = selectedChord.notes
          .map((note) => `<span class="note-chip">${note}</span>`)
          .join("");
      }

      chordGrid.addEventListener("pointerdown", (event) => {
        const button = event.target.closest(".chord-button");
        if (!button || event.button > 0) return;
        event.preventDefault();
        const chord = chords.find((item) => item.name === button.dataset.chord);
        if (!chord) return;
        selectChord(chord);
        holdNotes(`pointer-${event.pointerId}`, chord.notes, chord.name);
      });

      keyboard.addEventListener("pointerdown", (event) => {
        const key = event.target.closest(".key");
        if (!key || event.button > 0) return;
        event.preventDefault();
        holdNotes(`pointer-${event.pointerId}`, [key.dataset.note]);
      });

      document.addEventListener("pointerup", (event) => {
        releaseNotes(`pointer-${event.pointerId}`);
      });

      document.addEventListener("pointercancel", (event) => {
        releaseNotes(`pointer-${event.pointerId}`);
      });

      chordGrid.addEventListener("keydown", (event) => {
        if (event.repeat || ![" ", "Enter"].includes(event.key)) return;
        const button = event.target.closest(".chord-button");
        if (!button) return;
        event.preventDefault();
        const chord = chords.find((item) => item.name === button.dataset.chord);
        if (!chord) return;
        selectChord(chord);
        holdNotes(`key-${chord.name}`, chord.notes, chord.name);
      });

      chordGrid.addEventListener("keyup", (event) => {
        if (![" ", "Enter"].includes(event.key)) return;
        const button = event.target.closest(".chord-button");
        if (!button) return;
        event.preventDefault();
        releaseNotes(`key-${button.dataset.chord}`);
      });

      keyboard.addEventListener("keydown", (event) => {
        if (event.repeat || ![" ", "Enter"].includes(event.key)) return;
        const key = event.target.closest(".key");
        if (!key) return;
        event.preventDefault();
        holdNotes(`key-${key.dataset.note}`, [key.dataset.note]);
      });

      keyboard.addEventListener("keyup", (event) => {
        if (![" ", "Enter"].includes(event.key)) return;
        const key = event.target.closest(".key");
        if (!key) return;
        event.preventDefault();
        releaseNotes(`key-${key.dataset.note}`);
      });

      renderChords();
      renderKeyboard();
      renderNotes();
    </script>
  </body>
</html>
