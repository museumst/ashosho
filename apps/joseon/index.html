            <article class="king-card ${isKing ? "is-king" : "is-ancestor"}">
              <span class="king-order ${isKing ? "" : "is-ancestor"}">${badge}</span>
              <div class="king-copy">

                  <span>${person.personal}</span>
                </div>
                <p class="king-reign">${isKing ? "재위" : "표시"} ${person.reign}</p>
                <p class="king-relation">${person.relation}</p>
                <p class="king-note">${person.note}</p>
              </div>
            </article>
            ${
              children.length
                ? `<ol class="family-children">${children.map((child) => renderPerson(child)).join("")}</ol>`
                : ""
            }
          </li>
        `;
